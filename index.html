<!DOCTYPE html>
<html lang="vi" translate="no">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <meta name="google" content="notranslate">
    <title>📚 Flashcard · Đa ngôn ngữ</title>
    <!-- Fonts & Icons -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Quicksand:wght@500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <!-- Bộ gõ tiếng Việt VNKeys -->
    <script src="https://vnkeys.net/raw.htm?skey=vnkeys_js"></script>
    <!-- Bàn phím ảo đa ngôn ngữ Simple-Keyboard -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/simple-keyboard@latest/build/css/index.css">
    <script src="https://cdn.jsdelivr.net/npm/simple-keyboard@latest/build/index.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/simple-keyboard-layouts@latest/build/index.min.js"></script>
    <style>
        /* (Toàn bộ CSS giữ nguyên, chỉ thêm style cho bàn phím ảo mới) */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            min-height: 100vh;
            font-family: 'Inter', 'Quicksand', system-ui, sans-serif;
            background: #f0f7ff;
            background-attachment: fixed;
            position: relative;
            display: flex;
            justify-content: center;
            padding: 16px 12px 28px;
            color: #1a2e4b;
            overflow-x: hidden;
            touch-action: pan-y;
            transition: background 0.3s ease, color 0.3s ease;
        }
        body.dark-mode { background: #0f172a; color: #e0e7ff; }
        body.dark-mode::before {
            background-image: 
                radial-gradient(circle at 30% 40%, rgba(80, 150, 255, 0.15) 0%, transparent 30%),
                radial-gradient(circle at 70% 60%, rgba(100, 200, 150, 0.1) 0%, transparent 35%),
                radial-gradient(circle at 50% 80%, rgba(255, 180, 100, 0.08) 0%, transparent 40%);
        }
        body::before {
            content: "";
            position: fixed;
            inset: 0;
            background-image: 
                radial-gradient(circle at 30% 40%, rgba(120, 180, 255, 0.08) 0%, transparent 30%),
                radial-gradient(circle at 70% 60%, rgba(80, 200, 140, 0.06) 0%, transparent 35%),
                radial-gradient(circle at 50% 80%, rgba(255, 200, 120, 0.05) 0%, transparent 40%);
            z-index: -2;
            pointer-events: none;
        }
        body::after {
            content: "";
            position: fixed;
            inset: 0;
            background-image: 
                linear-gradient(#a0b8d0 1px, transparent 1px),
                linear-gradient(90deg, #a0b8d0 1px, transparent 1px);
            background-size: 64px 64px;
            opacity: 0.06;
            pointer-events: none;
            z-index: -1;
        }
        body.dark-mode::after {
            background-image: 
                linear-gradient(#334155 1px, transparent 1px),
                linear-gradient(90deg, #334155 1px, transparent 1px);
            opacity: 0.1;
        }
        #app { max-width: 760px; width: 100%; display: flex; flex-direction: column; gap: 16px; position: relative; z-index: 2; touch-action: pan-y; }
        
        @keyframes fadeSlideUp { 0% { opacity: 0; transform: translateY(12px); } 100% { opacity: 1; transform: translateY(0); } }
        @keyframes fadeSlideDown { 0% { opacity: 0; transform: translateY(-12px); } 100% { opacity: 1; transform: translateY(0); } }
        @keyframes scalePop { 0% { opacity: 0; transform: scale(0.92); } 100% { opacity: 1; transform: scale(1); } }
        .app-bar {
            display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 12px;
            background: rgba(255, 255, 255, 0.75); backdrop-filter: blur(16px); padding: 12px 20px;
            border-radius: 60px; border: 1px solid rgba(255, 255, 255, 0.6);
            box-shadow: 0 12px 24px -12px rgba(0, 40, 80, 0.12);
            animation: fadeSlideDown 0.5s ease-out;
        }
        body.dark-mode .app-bar { background: rgba(30, 41, 59, 0.8); border-color: rgba(255, 255, 255, 0.1); }
        h1 { font-family: 'Quicksand', sans-serif; font-weight: 700; font-size: clamp(1.5rem, 6vw, 2rem); display: flex; align-items: center; gap: 8px; color: #1e3a5f; }
        body.dark-mode h1 { color: #e0e7ff; }
        h1 i { color: #2e7eb0; background: rgba(255, 255, 255, 0.7); padding: 8px; border-radius: 18px; backdrop-filter: blur(4px); border: 1px solid rgba(255, 255, 255, 0.8); }
        .controls-group { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
        .lang-selector, .deck-selector, .quiz-deck-selector {
            background: rgba(255, 255, 255, 0.6); backdrop-filter: blur(8px); padding: 8px 16px; border-radius: 40px;
            border: 1px solid rgba(255,255,255,0.8); font-weight: 600; color: #1e4d74; outline: none; cursor: pointer;
        }
        body.dark-mode .lang-selector, body.dark-mode .deck-selector, body.dark-mode .quiz-deck-selector { background: rgba(30, 41, 59, 0.8); color: #cbd5e1; }
        .theme-toggle {
            background: rgba(255,255,255,0.6); border: 1px solid rgba(255,255,255,0.8); backdrop-filter: blur(8px);
            padding: 8px 12px; border-radius: 40px; cursor: pointer; color: #1e4d74;
        }
        .tabs-nav { display: flex; gap: 8px; background: rgba(255, 255, 255, 0.5); backdrop-filter: blur(12px); padding: 6px; border-radius: 60px; }
        .tab-btn {
            flex: 1; border: none; background: transparent; padding: 14px 4px; border-radius: 50px; font-weight: 650;
            color: #3a5e7a; cursor: pointer; transition: all 0.25s; display: flex; align-items: center; justify-content: center; gap: 6px;
        }
        .tab-btn.active { background: white; box-shadow: 0 8px 18px -8px #2e7eb030; color: #1a5f8a; }
        body.dark-mode .tab-btn.active { background: #1e293b; color: #e0e7ff; }
        .panel { display: none; animation: fadeSlideUp 0.35s; }
        .panel.active { display: block; }

        /* Flashcard */
        .flashcard-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
        .card-stage { perspective: 2000px; margin: 8px 0; }
        .swipe-container { width: 100%; border-radius: 40px; }
        .card { width: 100%; aspect-ratio: 5 / 3.2; cursor: pointer; border-radius: 40px; }
        .card-inner { position: relative; width: 100%; height: 100%; transition: transform 0.5s; transform-style: preserve-3d; border-radius: 40px; box-shadow: 0 20px 35px -10px rgba(0,40,80,0.15); }
        .card.flipped .card-inner { transform: rotateY(180deg); }
        .card-front, .card-back {
            position: absolute; width: 100%; height: 100%; backface-visibility: hidden; border-radius: 40px;
            padding: 20px; display: flex; flex-direction: column; justify-content: center; align-items: center;
            background: rgba(255,255,255,0.9); backdrop-filter: blur(12px); border: 1px solid rgba(255,255,255,0.8);
        }
        body.dark-mode .card-front, body.dark-mode .card-back { background: rgba(30, 41, 59, 0.9); }
        .card-back { transform: rotateY(180deg); }
        .card-content { font-size: clamp(1.8rem, 10vw, 3.4rem); font-weight: 700; color: #0b2b44; text-align: center; }
        body.dark-mode .card-content { color: #f0f4ff; }
        .swipe-hint { display: flex; justify-content: center; gap: 20px; margin: 12px 0; color: #4f7396; }
        .progress-area { display: flex; align-items: center; justify-content: space-between; margin: 12px 0; }
        .counter-badge { background: rgba(255,255,255,0.7); padding: 8px 20px; border-radius: 40px; font-weight: 600; }
        .action-group { display: flex; flex-wrap: wrap; gap: 10px; justify-content: center; margin: 16px 0; }
        .btn {
            background: rgba(255,255,255,0.8); backdrop-filter: blur(8px); border: 1px solid rgba(255,255,255,0.9);
            padding: 10px 18px; border-radius: 50px; font-weight: 600; color: #1e4d74; cursor: pointer;
            display: inline-flex; align-items: center; gap: 6px; transition: all 0.2s;
        }
        body.dark-mode .btn { background: rgba(30,41,59,0.8); color: #e0e7ff; }
        .btn-flip { background: #2e7eb0; color: white; }
        .btn:hover { transform: translateY(-2px); box-shadow: 0 12px 20px -10px #2e7eb040; }
        .btn:disabled { opacity: 0.5; pointer-events: none; }

        /* Wordlist */
        .decks-bar { display: flex; flex-wrap: wrap; align-items: center; gap: 8px; margin-bottom: 16px; }
        .deck-tabs { display: flex; flex-wrap: wrap; gap: 6px; flex: 1; }
        .deck-tab {
            background: rgba(255,255,255,0.6); border: none; padding: 8px 14px; border-radius: 30px; font-weight: 600; color: #1e4d74;
            cursor: pointer; backdrop-filter: blur(4px); border: 1px solid rgba(255,255,255,0.8); display: flex; align-items: center; gap: 6px;
        }
        .deck-tab.active { background: white; box-shadow: 0 6px 12px -6px #2e7eb040; }
        body.dark-mode .deck-tab { background: rgba(30,41,59,0.8); color: #cbd5e1; }
        body.dark-mode .deck-tab.active { background: #1e293b; }
        .add-deck-btn { background: #2e7eb0; color: white; border: none; padding: 8px 16px; border-radius: 30px; font-weight: 600; cursor: pointer; }
        .add-deck-form { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 8px; padding: 12px; background: rgba(255,255,255,0.6); border-radius: 36px; }
        .word-list-header { display: flex; justify-content: space-between; align-items: center; margin: 16px 0 10px; }
        .word-list {
            list-style: none; background: rgba(255,255,255,0.35); backdrop-filter: blur(16px); border-radius: 32px; padding: 8px 6px;
            max-height: 400px; overflow-y: auto; border: 1px solid rgba(255,255,255,0.5);
        }
        .word-item {
            display: flex; align-items: center; padding: 14px 16px; margin: 6px 8px; background: rgba(255,255,255,0.7);
            border-radius: 24px; border: 1px solid rgba(255,255,255,0.8);
        }
        body.dark-mode .word-item { background: rgba(30,41,59,0.7); }
        .word-index { width: 36px; height: 36px; display: flex; align-items: center; justify-content: center; background: #2e7eb0; color: white; border-radius: 18px; margin-right: 16px; }
        .word-info { flex: 1; }
        .word-term { font-weight: 700; font-size: 1.25rem; }
        .item-actions { display: flex; gap: 8px; }
        .icon-btn {
            background: rgba(255,255,255,0.9); border: none; width: 42px; height: 42px; border-radius: 24px;
            display: flex; align-items: center; justify-content: center; color: #1e4d74; cursor: pointer;
        }
        .add-word-form { display: flex; flex-wrap: wrap; gap: 10px; margin-top: 20px; }
        .add-word-form input { flex: 1 1 160px; padding: 14px 18px; border-radius: 40px; border: 1px solid #cbdbe9; background: white; font-size: 1rem; outline: none; }
        body.dark-mode .add-word-form input { background: #0f172a; color: #e0e7ff; }
        .add-word-form input:focus { border-color: #2e7eb0; box-shadow: 0 0 0 3px #2e7eb030; }

        /* Thanh công cụ bộ gõ IME */
        .ime-toolbar {
            display: flex; align-items: center; gap: 12px; margin-bottom: 8px; padding: 8px 12px;
            background: rgba(255, 255, 255, 0.5); backdrop-filter: blur(12px); border-radius: 60px;
            border: 1px solid rgba(255,255,255,0.8);
        }
        body.dark-mode .ime-toolbar { background: rgba(30,41,59,0.6); border-color: rgba(255,255,255,0.1); }
        .ime-status { display: flex; align-items: center; gap: 8px; }
        .ime-badge {
            background: #2e7eb0; color: white; padding: 6px 16px; border-radius: 30px; font-weight: 600; font-size: 0.9rem;
            box-shadow: 0 4px 8px -2px #2e7eb060;
        }
        .ime-selector { display: flex; gap: 6px; margin-left: auto; }
        .ime-btn {
            background: rgba(255,255,255,0.6); border: 1px solid rgba(255,255,255,0.9); border-radius: 30px;
            padding: 6px 14px; font-weight: 600; color: #1e4d74; cursor: pointer; transition: 0.2s;
        }
        .ime-btn.active { background: white; box-shadow: 0 6px 12px -4px #2e7eb040; }
        body.dark-mode .ime-btn { background: rgba(30,41,59,0.8); color: #cbd5e1; }
        body.dark-mode .ime-btn.active { background: #1e293b; color: #e0e7ff; }

        /* Bàn phím ảo Simple-Keyboard */
        .virtual-keyboard-container {
            margin-top: 16px;
            border-radius: 28px;
            overflow: hidden;
            box-shadow: 0 20px 35px -10px rgba(0,40,80,0.25);
            animation: scalePop 0.2s;
            display: none;
        }
        .simple-keyboard {
            background: rgba(255, 255, 255, 0.95) !important;
            backdrop-filter: blur(16px);
            border-radius: 28px !important;
            padding: 10px 6px !important;
            border: 1px solid rgba(255,255,255,0.9);
        }
        body.dark-mode .simple-keyboard {
            background: rgba(30, 41, 59, 0.95) !important;
            border-color: #334155;
        }
        .hg-theme-default .hg-button {
            background: white !important;
            border-radius: 18px !important;
            font-weight: 600 !important;
            box-shadow: 0 6px 12px -4px rgba(0,0,0,0.08) !important;
            border: none !important;
            color: #1e3a5f !important;
            height: 52px !important;
            font-size: 1.2rem !important;
            transition: all 0.15s ease !important;
            margin: 3px !important;
            border: 1px solid rgba(255,255,255,0.5) !important;
        }
        body.dark-mode .hg-theme-default .hg-button {
            background: #334155 !important;
            color: #e0e7ff !important;
            border-color: #475569 !important;
        }
        .hg-theme-default .hg-button:active { background: #e2e8f0 !important; transform: scale(0.92) !important; }
        .keyboard-header { display: flex; justify-content: flex-end; padding: 0 8px 8px; }
        .keyboard-close-btn {
            background: rgba(255,255,255,0.5); border: none; border-radius: 30px; padding: 6px 16px;
            font-size: 0.9rem; backdrop-filter: blur(8px); color: #1e4d74; cursor: pointer;
            border: 1px solid rgba(255,255,255,0.8); transition: 0.2s;
        }

        /* Quiz */
        .quiz-container { background: rgba(255,255,255,0.65); backdrop-filter: blur(20px); border-radius: 40px; padding: 24px 20px; }
        .quiz-question { font-size: clamp(1.8rem, 8vw, 2.4rem); font-weight: 700; text-align: center; margin-bottom: 28px; }
        .quiz-input { width: 100%; padding: 16px 20px; font-size: 1.2rem; border-radius: 50px; border: 1px solid #cbdbe9; margin-bottom: 20px; }
        body.dark-mode .quiz-input { background: #0f172a; color: #e0e7ff; }
        .quiz-feedback { min-height: 50px; font-weight: 600; }
        .quiz-feedback.correct { color: #1e8a5e; }
        .quiz-feedback.incorrect { color: #c24a4a; }

        .empty-msg { text-align: center; padding: 40px; color: #5a7e9c; }
        .toast-msg {
            position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); background: #1e3a5f; color: white;
            padding: 12px 24px; border-radius: 50px; z-index: 999; animation: fadeSlideUp 0.3s;
        }
        @media (max-width: 480px) {
            .btn { padding: 10px 16px; }
            .hg-theme-default .hg-button { height: 46px !important; font-size: 1rem !important; }
        }
    </style>
</head>
<body translate="no">
<div id="app">
    <div class="app-bar">
        <h1><i class="fas fa-layer-group"></i> Flashcard</h1>
        <div class="controls-group">
            <select id="langSelector" class="lang-selector"></select>
            <button id="themeToggle" class="theme-toggle"><i class="fas fa-moon"></i></button>
        </div>
    </div>

    <div class="tabs-nav">
        <button class="tab-btn active" data-tab="flashcard"><i class="fas fa-clone"></i> Học</button>
        <button class="tab-btn" data-tab="wordlist"><i class="fas fa-list-ul"></i> Từ vựng</button>
        <button class="tab-btn" data-tab="quiz"><i class="fas fa-pencil"></i> Kiểm tra</button>
    </div>

    <!-- FLASHCARD PANEL -->
    <div id="panel-flashcard" class="panel active">
        <div class="flashcard-header">
            <select id="flashcardDeckSelector" class="deck-selector"></select>
        </div>
        <div class="card-stage" id="cardStage">
            <div class="swipe-container" id="swipeContainer"><div id="cardScene"></div></div>
            <div class="swipe-hint"><i class="fas fa-chevron-left"></i> Vuốt để chuyển <i class="fas fa-chevron-right"></i></div>
        </div>
        <div class="progress-area">
            <span class="counter-badge" id="counterDisplay">0/0</span>
            <button class="btn" id="deleteCardFlashBtn"><i class="fas fa-trash-alt"></i> Xóa</button>
        </div>
        <div class="action-group">
            <button class="btn" id="prevBtn"><i class="fas fa-arrow-left"></i> Trước</button>
            <button class="btn btn-flip" id="flipBtn"><i class="fas fa-sync-alt"></i> Lật</button>
            <button class="btn" id="nextBtn">Tiếp <i class="fas fa-arrow-right"></i></button>
            <button class="btn" id="randomFlashBtn"><i class="fas fa-shuffle"></i> Ngẫu nhiên</button>
        </div>
    </div>

    <!-- WORDLIST PANEL -->
    <div id="panel-wordlist" class="panel">
        <div class="decks-bar">
            <div class="deck-tabs" id="deckTabsContainer"></div>
            <button class="add-deck-btn" id="showAddDeckFormBtn"><i class="fas fa-plus-circle"></i> Thêm bộ</button>
        </div>
        <div id="addDeckForm" class="add-deck-form" style="display: none;">
            <input type="text" id="newDeckName" placeholder="Tên bộ" style="flex:2;">
            <select id="newDeckLang" style="flex:1;">
                <option value="vi">Tiếng Việt</option><option value="en">English</option><option value="zh">中文</option>
                <option value="ko">한국어</option><option value="ja">日本語</option><option value="fr">Français</option>
                <option value="de">Deutsch</option><option value="es">Español</option><option value="ru">Русский</option><option value="it">Italiano</option>
            </select>
            <button class="btn" id="confirmAddDeckBtn"><i class="fas fa-check"></i> Tạo</button>
            <button class="btn" id="cancelAddDeckBtn"><i class="fas fa-times"></i> Huỷ</button>
        </div>
        <div class="word-list-header">
            <span class="word-count" id="wordCount">0 từ</span>
            <button class="btn" id="exportWordBtn"><i class="fas fa-file-word"></i> Xuất Word</button>
        </div>
        <ul class="word-list" id="wordListContainer"></ul>
        
        <!-- Thanh công cụ IME -->
        <div class="ime-toolbar">
            <div class="ime-status">
                <i class="fas fa-keyboard"></i>
                <span id="imeCurrentMethod" class="ime-badge">TELEX</span>
            </div>
            <div class="ime-selector" id="imeSelectorGroup">
                <button class="ime-btn" data-method="off">OFF</button>
                <button class="ime-btn active" data-method="telex">TELEX</button>
                <button class="ime-btn" data-method="vni">VNI</button>
            </div>
        </div>

        <div class="add-word-form">
            <input type="text" id="newWordInput" placeholder="Từ" maxlength="80" data-vnkeys="true" lang="vi">
            <input type="text" id="newDefInput" placeholder="Nghĩa" maxlength="120" data-vnkeys="true" lang="vi">
            <button class="btn" id="addWordBtn" style="background:#2e7eb0; color:white;"><i class="fas fa-plus"></i> Thêm</button>
            <button class="btn" id="cancelEditBtn" style="display:none;"><i class="fas fa-times"></i> Huỷ</button>
        </div>
        
        <!-- Bàn phím ảo đa ngôn ngữ -->
        <div class="virtual-keyboard-container" id="virtualKeyboardContainer">
            <div class="keyboard-header">
                <button class="keyboard-close-btn" id="closeVirtualKeyboardBtn"><i class="fas fa-times"></i> Đóng</button>
            </div>
            <div class="simple-keyboard" id="multiLangKeyboard"></div>
        </div>

        <div class="word-tip"><i class="far fa-lightbulb"></i> Mẹo: Sử dụng bàn phím ảo cho các ngôn ngữ khác tiếng Việt.</div>
    </div>

    <!-- QUIZ PANEL -->
    <div id="panel-quiz" class="panel">
        <div class="quiz-container">
            <div class="quiz-header">
                <div class="quiz-mode">
                    <button class="btn active" id="modeTermToDef"><i class="fas fa-arrow-right"></i> Từ → Nghĩa</button>
                    <button class="btn" id="modeDefToTerm"><i class="fas fa-arrow-left"></i> Nghĩa → Từ</button>
                </div>
                <select id="quizDeckSelector" class="quiz-deck-selector"></select>
            </div>
            <div class="quiz-question" id="quizQuestion">—</div>
            <input type="text" id="quizAnswerInput" class="quiz-input" placeholder="Nhập câu trả lời...">
            <div class="quiz-feedback" id="quizFeedback"></div>
            <div class="quiz-actions">
                <button class="btn" id="submitQuizBtn"><i class="fas fa-check"></i> Kiểm tra</button>
                <button class="btn" id="nextQuizBtn"><i class="fas fa-forward"></i> Câu tiếp</button>
                <button class="btn" id="newQuizBtn"><i class="fas fa-arrows-rotate"></i> Làm mới</button>
            </div>
        </div>
    </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
<script>
(function(){
    "use strict";

    // ----- Dữ liệu & Khởi tạo -----
    let currentLang = 'vi';
    const languages = ['vi', 'en', 'zh', 'ko', 'ja', 'fr', 'de', 'es', 'ru', 'it'];
    const langNames = { vi:'Tiếng Việt', en:'English', zh:'中文', ko:'한국어', ja:'日本語', fr:'Français', de:'Deutsch', es:'Español', ru:'Русский', it:'Italiano' };
    
    let decks = {};
    let currentWordlistDeck = 'vi';
    let currentFlashcardDeck = 'vi';
    let currentQuizDeck = 'vi';
    let currentIndex = 0;
    let isFlipped = false;
    let editingIndex = -1;
    let quizMode = 'termToDef';
    let currentQuizCard = null;
    let darkMode = false;
    let currentIMEMethod = 'telex';
    let virtualKeyboard = null;
    let activeKeyboardInput = null;

    // DOM elements
    const panels = {
        flashcard: document.getElementById('panel-flashcard'),
        wordlist: document.getElementById('panel-wordlist'),
        quiz: document.getElementById('panel-quiz')
    };
    const cardScene = document.getElementById('cardScene');
    const counterDisplay = document.getElementById('counterDisplay');
    const prevBtn = document.getElementById('prevBtn');
    const nextBtn = document.getElementById('nextBtn');
    const flipBtn = document.getElementById('flipBtn');
    const randomFlashBtn = document.getElementById('randomFlashBtn');
    const deleteCardFlashBtn = document.getElementById('deleteCardFlashBtn');
    const wordListContainer = document.getElementById('wordListContainer');
    const wordCountSpan = document.getElementById('wordCount');
    const newWordInput = document.getElementById('newWordInput');
    const newDefInput = document.getElementById('newDefInput');
    const addWordBtn = document.getElementById('addWordBtn');
    const cancelEditBtn = document.getElementById('cancelEditBtn');
    const exportWordBtn = document.getElementById('exportWordBtn');
    const deckTabsContainer = document.getElementById('deckTabsContainer');
    const showAddDeckFormBtn = document.getElementById('showAddDeckFormBtn');
    const addDeckForm = document.getElementById('addDeckForm');
    const newDeckName = document.getElementById('newDeckName');
    const newDeckLang = document.getElementById('newDeckLang');
    const confirmAddDeckBtn = document.getElementById('confirmAddDeckBtn');
    const cancelAddDeckBtn = document.getElementById('cancelAddDeckBtn');
    const quizQuestion = document.getElementById('quizQuestion');
    const quizAnswerInput = document.getElementById('quizAnswerInput');
    const quizFeedback = document.getElementById('quizFeedback');
    const submitQuizBtn = document.getElementById('submitQuizBtn');
    const nextQuizBtn = document.getElementById('nextQuizBtn');
    const newQuizBtn = document.getElementById('newQuizBtn');
    const modeTermToDef = document.getElementById('modeTermToDef');
    const modeDefToTerm = document.getElementById('modeDefToTerm');
    const quizDeckSelector = document.getElementById('quizDeckSelector');
    const flashcardDeckSelector = document.getElementById('flashcardDeckSelector');
    const langSelect = document.getElementById('langSelector');
    const themeToggle = document.getElementById('themeToggle');
    const imeCurrentMethod = document.getElementById('imeCurrentMethod');
    const imeSelectorGroup = document.getElementById('imeSelectorGroup');
    const virtualKeyboardContainer = document.getElementById('virtualKeyboardContainer');
    const closeVirtualKeyboardBtn = document.getElementById('closeVirtualKeyboardBtn');

    let touchStartX = 0, touchCurrentX = 0, isSwiping = false;
    const SWIPE_THRESHOLD = 50;

    // ----- Helper -----
    function escapeHtml(t) { return String(t).replace(/[&<>]/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;'})[c]); }
    function showToast(msg) {
        const toast = document.createElement('div');
        toast.className = 'toast-msg';
        toast.textContent = msg;
        document.body.appendChild(toast);
        setTimeout(() => toast.remove(), 3000);
    }

    // ----- Cấu hình Bàn phím ảo đa ngôn ngữ -----
    function initVirtualKeyboard() {
        const Keyboard = window.SimpleKeyboard.default;
        const KeyboardLayouts = window.SimpleKeyboardLayouts.default;
        const layoutLoader = new KeyboardLayouts();
        
        virtualKeyboard = new Keyboard({
            onChange: input => { if (activeKeyboardInput) activeKeyboardInput.value = input; },
            onKeyPress: button => { if (button === "{enter}" && activeKeyboardInput) hideVirtualKeyboard(); },
            layout: layoutLoader.get("vietnamese"),
            theme: "hg-theme-default",
            display: { "{bksp}": "⌫", "{enter}": "⏎", "{shift}": "⇧", "{lock}": "⇪", "{tab}": "↹", "{space}": "␣" }
        });
    }

    function getLayoutNameForLang(lang) {
        const map = {
            'vi': 'vietnamese', 'en': 'english', 'zh': 'chinese', 'ko': 'korean',
            'ja': 'japanese', 'fr': 'french', 'de': 'german', 'es': 'spanish',
            'ru': 'russian', 'it': 'italian'
        };
        return map[lang] || 'english';
    }

    function showVirtualKeyboard(inputEl) {
        if (!virtualKeyboard) initVirtualKeyboard();
        activeKeyboardInput = inputEl;
        const layoutName = getLayoutNameForLang(currentWordlistDeck);
        const KeyboardLayouts = window.SimpleKeyboardLayouts.default;
        const layoutLoader = new KeyboardLayouts();
        virtualKeyboard.setOptions({
            inputName: inputEl.id,
            layout: layoutLoader.get(layoutName)
        });
        virtualKeyboard.setInput(inputEl.value);
        virtualKeyboardContainer.style.display = 'block';
    }

    function hideVirtualKeyboard() {
        virtualKeyboardContainer.style.display = 'none';
        activeKeyboardInput = null;
    }

    // ----- Cấu hình bộ gõ VNKeys -----
    function setVNKeysMethod(method) {
        currentIMEMethod = method;
        imeCurrentMethod.textContent = method.toUpperCase();
        document.querySelectorAll('.ime-btn').forEach(btn => {
            btn.classList.toggle('active', btn.dataset.method === method);
        });
        if (typeof VNKeys !== 'undefined' && VNKeys.setMethod) {
            VNKeys.setMethod(method);
        }
    }

    function initVNKeys() {
        if (typeof VNKeys !== 'undefined') {
            setVNKeysMethod('telex');
        } else {
            setTimeout(initVNKeys, 100);
        }
    }

    function updateIMEVisibility() {
        const isVietnamese = currentWordlistDeck === 'vi';
        imeSelectorGroup.style.display = isVietnamese ? 'flex' : 'none';
        imeCurrentMethod.style.display = isVietnamese ? 'inline-block' : 'none';
        if (!isVietnamese) {
            setVNKeysMethod('off');
        } else {
            setVNKeysMethod(currentIMEMethod);
        }
    }

    // ----- Quản lý Decks -----
    function initDecks() {
        const stored = localStorage.getItem('flashcard_decks_v12');
        if (stored) { try { decks = JSON.parse(stored); } catch(e){ setDefaultDecks(); } }
        else { setDefaultDecks(); }
        if (!decks || Object.keys(decks).length === 0) setDefaultDecks();
        if (!decks[currentWordlistDeck]) currentWordlistDeck = Object.keys(decks)[0];
        if (!decks[currentFlashcardDeck]) currentFlashcardDeck = currentWordlistDeck;
        if (!decks[currentQuizDeck]) currentQuizDeck = currentWordlistDeck;
    }
    function setDefaultDecks() {
        decks = {
            vi: { name: 'Tiếng Việt', cards: [{ question: "xin chào", answer: "hello" },{ question: "cảm ơn", answer: "thank you" }] },
            en: { name: 'English', cards: [{ question: "hello", answer: "xin chào" },{ question: "thank you", answer: "cảm ơn" }] }
        };
    }
    function saveDecks() { localStorage.setItem('flashcard_decks_v12', JSON.stringify(decks)); }

    function updateAllDeckSelectors() {
        const updateSelect = (selectEl, currentKey) => {
            selectEl.innerHTML = '';
            Object.keys(decks).forEach(key => {
                const opt = document.createElement('option');
                opt.value = key;
                opt.textContent = `${decks[key].name} (${key})`;
                if (key === currentKey) opt.selected = true;
                selectEl.appendChild(opt);
            });
        };
        updateSelect(flashcardDeckSelector, currentFlashcardDeck);
        updateSelect(quizDeckSelector, currentQuizDeck);
    }

    function renderDeckTabs() {
        deckTabsContainer.innerHTML = '';
        Object.keys(decks).forEach(key => {
            const deck = decks[key];
            const tab = document.createElement('button');
            tab.className = `deck-tab ${key === currentWordlistDeck ? 'active' : ''}`;
            tab.innerHTML = `${deck.name} (${key}) <i class="fas fa-times delete-deck" data-deck="${key}"></i>`;
            tab.addEventListener('click', (e) => {
                if (e.target.classList.contains('delete-deck')) {
                    e.stopPropagation();
                    if (Object.keys(decks).length <= 1) { showToast('⚠️ Không thể xóa bộ duy nhất.'); return; }
                    delete decks[key];
                    saveDecks();
                    if (currentWordlistDeck === key) currentWordlistDeck = Object.keys(decks)[0];
                    if (currentFlashcardDeck === key) currentFlashcardDeck = currentWordlistDeck;
                    if (currentQuizDeck === key) currentQuizDeck = currentWordlistDeck;
                    renderDeckTabs(); updateAllDeckSelectors();
                    renderWordList(); renderFlashcard(); loadQuiz();
                    updateIMEVisibility();
                } else {
                    currentWordlistDeck = key;
                    renderDeckTabs(); renderWordList();
                    updateIMEVisibility();
                }
            });
            deckTabsContainer.appendChild(tab);
        });
    }

    // ----- Flashcard -----
    function getCurrentFlashcardCards() { return decks[currentFlashcardDeck]?.cards || []; }
    function getCurrentWordlistCards() { return decks[currentWordlistDeck]?.cards || []; }
    function renderFlashcard() {
        const cards = getCurrentFlashcardCards();
        if (!cards.length) {
            cardScene.innerHTML = `<div class="empty-msg"><i class="far fa-folder-open"></i><br>Chưa có thẻ</div>`;
            counterDisplay.textContent = '0/0';
            [prevBtn, nextBtn, flipBtn, randomFlashBtn, deleteCardFlashBtn].forEach(b => b.disabled = true);
            return;
        }
        if (currentIndex < 0) currentIndex = 0;
        if (currentIndex >= cards.length) currentIndex = cards.length - 1;
        const card = cards[currentIndex];
        cardScene.innerHTML = `<div class="card ${isFlipped?'flipped':''}" id="flashcard">
            <div class="card-inner">
                <div class="card-front"><div class="card-content">${escapeHtml(card.question)}</div></div>
                <div class="card-back"><div class="card-content">${escapeHtml(card.answer)}</div></div>
            </div>
        </div>`;
        document.getElementById('flashcard')?.addEventListener('click', () => { if(!isSwiping) toggleFlip(); });
        counterDisplay.textContent = `${currentIndex+1}/${cards.length}`;
        [prevBtn, nextBtn, flipBtn, randomFlashBtn, deleteCardFlashBtn].forEach(b => b.disabled = false);
        prevBtn.disabled = currentIndex === 0;
        nextBtn.disabled = currentIndex === cards.length - 1;
    }
    function toggleFlip() {
        if(!getCurrentFlashcardCards().length) return;
        isFlipped = !isFlipped;
        renderFlashcard();
    }
    function goPrev() { if(currentIndex > 0) { currentIndex--; isFlipped = false; renderFlashcard(); } }
    function goNext() { const cards = getCurrentFlashcardCards(); if(currentIndex < cards.length - 1) { currentIndex++; isFlipped = false; renderFlashcard(); } }
    function goRandom() {
        const cards = getCurrentFlashcardCards();
        if(cards.length > 1) {
            let n; do { n = Math.floor(Math.random() * cards.length); } while (n === currentIndex);
            currentIndex = n; isFlipped = false; renderFlashcard();
        }
    }
    function deleteCurrentFlash() {
        const cards = decks[currentFlashcardDeck].cards;
        if(!cards.length) return;
        cards.splice(currentIndex, 1);
        saveDecks();
        if(!cards.length) { currentIndex = -1; renderFlashcard(); renderWordList(); updateAllDeckSelectors(); return; }
        if(currentIndex >= cards.length) currentIndex = cards.length - 1;
        isFlipped = false;
        renderFlashcard();
        renderWordList();
        updateAllDeckSelectors();
    }

    // Vuốt
    const stage = document.getElementById('cardStage');
    const swipeContainer = document.getElementById('swipeContainer');
    stage.addEventListener('touchstart', (e) => {
        if(!getCurrentFlashcardCards().length) return;
        touchStartX = e.touches[0].clientX;
        isSwiping = true;
        swipeContainer.style.transition = 'none';
    }, {passive: true});
    stage.addEventListener('touchmove', (e) => {
        if(!isSwiping) return;
        touchCurrentX = e.touches[0].clientX;
        let dx = touchCurrentX - touchStartX;
        dx = Math.max(-120, Math.min(120, dx));
        swipeContainer.style.transform = `translateX(${dx}px)`;
    }, {passive: true});
    stage.addEventListener('touchend', () => {
        if(!isSwiping) return;
        isSwiping = false;
        const dx = touchCurrentX - touchStartX;
        swipeContainer.style.transition = 'transform 0.25s';
        if (Math.abs(dx) > SWIPE_THRESHOLD) {
            if (dx > 0 && currentIndex > 0) {
                swipeContainer.style.transform = 'translateX(130%) scale(0.95)';
                setTimeout(() => { goPrev(); swipeContainer.style.transition = ''; swipeContainer.style.transform = ''; }, 200);
            } else if (dx < 0 && currentIndex < getCurrentFlashcardCards().length - 1) {
                swipeContainer.style.transform = 'translateX(-130%) scale(0.95)';
                setTimeout(() => { goNext(); swipeContainer.style.transition = ''; swipeContainer.style.transform = ''; }, 200);
            } else {
                swipeContainer.style.transform = 'translateX(0)';
                setTimeout(() => swipeContainer.style.transition = '', 200);
            }
        } else {
            swipeContainer.style.transform = 'translateX(0)';
            setTimeout(() => swipeContainer.style.transition = '', 200);
        }
    });

    // ----- Wordlist -----
    function renderWordList() {
        const cards = getCurrentWordlistCards();
        wordCountSpan.textContent = `${cards.length} từ`;
        if (!cards.length) {
            wordListContainer.innerHTML = `<li class="empty-msg">Chưa có từ</li>`;
            return;
        }
        let html = '';
        cards.forEach((c, i) => {
            html += `<li class="word-item">
                <span class="word-index">${i+1}</span>
                <div class="word-info"><div class="word-term">${escapeHtml(c.question)}</div><div>${escapeHtml(c.answer)}</div></div>
                <div class="item-actions">
                    <button class="icon-btn edit-word" data-index="${i}"><i class="fas fa-pen"></i></button>
                    <button class="icon-btn delete-word" data-index="${i}"><i class="fas fa-trash"></i></button>
                </div>
            </li>`;
        });
        wordListContainer.innerHTML = html;
        wordListContainer.querySelectorAll('.delete-word').forEach(b => b.addEventListener('click', e => {
            const idx = b.dataset.index;
            if (idx !== undefined) {
                decks[currentWordlistDeck].cards.splice(idx, 1);
                saveDecks();
                renderWordList();
                if (currentWordlistDeck === currentFlashcardDeck) renderFlashcard();
                updateAllDeckSelectors();
            }
        }));
        wordListContainer.querySelectorAll('.edit-word').forEach(b => b.addEventListener('click', e => {
            const idx = b.dataset.index;
            if (idx !== undefined) {
                const c = decks[currentWordlistDeck].cards[idx];
                newWordInput.value = c.question;
                newDefInput.value = c.answer;
                editingIndex = idx;
                addWordBtn.innerHTML = `<i class="fas fa-pen"></i> Cập nhật`;
                cancelEditBtn.style.display = 'flex';
            }
        }));
    }
    function addOrUpdateWord() {
        const q = newWordInput.value.trim(), a = newDefInput.value.trim();
        if (!q || !a) return;
        const cards = decks[currentWordlistDeck].cards;
        if (editingIndex > -1) {
            cards[editingIndex] = { question: q, answer: a };
            editingIndex = -1;
            addWordBtn.innerHTML = `<i class="fas fa-plus"></i> Thêm`;
            cancelEditBtn.style.display = 'none';
        } else {
            cards.push({ question: q, answer: a });
        }
        saveDecks();
        newWordInput.value = newDefInput.value = '';
        renderWordList();
        if (currentWordlistDeck === currentFlashcardDeck) renderFlashcard();
        updateAllDeckSelectors();
        hideVirtualKeyboard();
    }
    cancelEditBtn.addEventListener('click', () => {
        editingIndex = -1;
        newWordInput.value = newDefInput.value = '';
        addWordBtn.innerHTML = `<i class="fas fa-plus"></i> Thêm`;
        cancelEditBtn.style.display = 'none';
    });
    addWordBtn.addEventListener('click', addOrUpdateWord);

    // Xuất Word
    exportWordBtn.addEventListener('click', async () => {
        const cards = getCurrentWordlistCards();
        if (!cards.length) { showToast('⚠️ Chưa có từ nào.'); return; }
        const Zip = new JSZip();
        let xmlRows = '';
        cards.forEach((c, idx) => {
            const bgColor = (idx % 2 === 0) ? 'FFFFFF' : 'F2F7FF';
            xmlRows += `<w:tr><w:tc><w:tcPr><w:shd w:val="clear" w:color="auto" w:fill="${bgColor}"/></w:tcPr><w:p><w:pPr><w:jc w:val="center"/></w:pPr><w:r><w:rPr><w:sz w:val="28"/></w:rPr><w:t>${escapeHtml(c.question)}</w:t></w:r></w:p></w:tc><w:tc><w:tcPr><w:shd w:val="clear" w:color="auto" w:fill="${bgColor}"/></w:tcPr><w:p><w:pPr><w:jc w:val="center"/></w:pPr><w:r><w:rPr><w:sz w:val="28"/></w:rPr><w:t>${escapeHtml(c.answer)}</w:t></w:r></w:p></w:tc></w:tr>`;
        });
        const documentXml = `<?xml version="1.0" encoding="UTF-8"?><w:document xmlns:w="http://schemas.openxmlformats.org/wordprocessingml/2006/main"><w:body><w:tbl>${xmlRows}</w:tbl></w:body></w:document>`;
        Zip.file("word/document.xml", documentXml);
        Zip.file("_rels/.rels", `<?xml version="1.0"?><Relationships xmlns="http://schemas.openxmlformats.org/package/2006/relationships"><Relationship Id="rId1" Type="http://schemas.openxmlformats.org/officeDocument/2006/relationships/officeDocument" Target="word/document.xml"/></Relationships>`);
        Zip.file("[Content_Types].xml", `<?xml version="1.0"?><Types xmlns="http://schemas.openxmlformats.org/package/2006/content-types"><Default Extension="rels" ContentType="application/vnd.openxmlformats-package.relationships+xml"/><Default Extension="xml" ContentType="application/xml"/><Override PartName="/word/document.xml" ContentType="application/vnd.openxmlformats-officedocument.wordprocessingml.document.main+xml"/></Types>`);
        const blob = await Zip.generateAsync({type:"blob"});
        const a = document.createElement('a'); a.href = URL.createObjectURL(blob); a.download = `flashcard_${currentWordlistDeck}.docx`; a.click();
        showToast('📄 File .docx đã sẵn sàng!');
    });

    // ----- Quiz -----
    function getQuizCards() { return decks[currentQuizDeck]?.cards || []; }
    function loadQuiz() {
        const cards = getQuizCards();
        currentQuizCard = cards[Math.floor(Math.random() * cards.length)] || null;
        if (!currentQuizCard) { quizQuestion.textContent = '—'; return; }
        quizQuestion.textContent = quizMode === 'termToDef' ? currentQuizCard.question : currentQuizCard.answer;
        quizAnswerInput.value = '';
        quizFeedback.textContent = '';
        quizFeedback.className = 'quiz-feedback';
    }
    function checkQuiz() {
        if(!currentQuizCard) return;
        const ans = quizAnswerInput.value.trim().toLowerCase();
        const correct = (quizMode === 'termToDef' ? currentQuizCard.answer : currentQuizCard.question).toLowerCase();
        const isCorrect = ans === correct;
        quizFeedback.textContent = isCorrect ? '✅ Chính xác!' : `❌ Đáp án: ${escapeHtml(quizMode==='termToDef'? currentQuizCard.answer : currentQuizCard.question)}`;
        quizFeedback.classList.add(isCorrect ? 'correct' : 'incorrect');
    }
    submitQuizBtn.addEventListener('click', checkQuiz);
    nextQuizBtn.addEventListener('click', loadQuiz);
    newQuizBtn.addEventListener('click', loadQuiz);
    modeTermToDef.addEventListener('click', ()=>{
        quizMode = 'termToDef';
        modeTermToDef.classList.add('active'); modeDefToTerm.classList.remove('active');
        loadQuiz();
    });
    modeDefToTerm.addEventListener('click', ()=>{
        quizMode = 'defToTerm';
        modeDefToTerm.classList.add('active'); modeTermToDef.classList.remove('active');
        loadQuiz();
    });

    // ----- Theme & Lang -----
    function toggleTheme() {
        darkMode = !darkMode;
        document.body.classList.toggle('dark-mode', darkMode);
        themeToggle.innerHTML = darkMode ? '<i class="fas fa-sun"></i>' : '<i class="fas fa-moon"></i>';
        localStorage.setItem('flashcard_theme', darkMode ? 'dark' : 'light');
    }
    themeToggle.addEventListener('click', toggleTheme);
    langSelect.addEventListener('change', (e) => { currentLang = e.target.value; });

    // Thêm bộ mới
    showAddDeckFormBtn.addEventListener('click', () => { addDeckForm.style.display = 'flex'; newDeckName.focus(); });
    cancelAddDeckBtn.addEventListener('click', () => { addDeckForm.style.display = 'none'; newDeckName.value = ''; });
    confirmAddDeckBtn.addEventListener('click', () => {
        const name = newDeckName.value.trim(), lang = newDeckLang.value;
        if (!name) { showToast('⚠️ Vui lòng nhập tên bộ'); return; }
        if (decks[lang]) { showToast('⚠️ Bộ với mã này đã tồn tại'); return; }
        decks[lang] = { name, cards: [] };
        saveDecks();
        renderDeckTabs(); updateAllDeckSelectors();
        currentWordlistDeck = lang; renderDeckTabs(); renderWordList();
        updateIMEVisibility();
        addDeckForm.style.display = 'none'; newDeckName.value = '';
        showToast(`✅ Đã tạo bộ "${name}"`);
    });

    // Chuyển tab
    document.querySelectorAll('.tab-btn').forEach(b => b.addEventListener('click', () => {
        const tab = b.dataset.tab;
        Object.values(panels).forEach(p => p.classList.remove('active'));
        panels[tab].classList.add('active');
        document.querySelectorAll('.tab-btn').forEach(t => t.classList.toggle('active', t.dataset.tab === tab));
        if (tab === 'flashcard') renderFlashcard();
        if (tab === 'wordlist') renderWordList();
        if (tab === 'quiz') loadQuiz();
        hideVirtualKeyboard();
    }));

    // Điều khiển flashcard
    prevBtn.addEventListener('click', goPrev);
    nextBtn.addEventListener('click', goNext);
    flipBtn.addEventListener('click', toggleFlip);
    randomFlashBtn.addEventListener('click', goRandom);
    deleteCardFlashBtn.addEventListener('click', deleteCurrentFlash);
    flashcardDeckSelector.addEventListener('change', (e) => {
        currentFlashcardDeck = e.target.value;
        currentIndex = 0; isFlipped = false;
        renderFlashcard();
    });
    quizDeckSelector.addEventListener('change', (e) => {
        currentQuizDeck = e.target.value;
        loadQuiz();
    });

    // Xử lý bộ gõ và bàn phím ảo
    document.querySelectorAll('.ime-btn').forEach(btn => {
        btn.addEventListener('click', () => setVNKeysMethod(btn.dataset.method));
    });

    newWordInput.addEventListener('focus', (e) => {
        if (currentWordlistDeck === 'vi') {
            hideVirtualKeyboard();
        } else {
            showVirtualKeyboard(newWordInput);
        }
    });
    newDefInput.addEventListener('focus', (e) => {
        if (currentWordlistDeck === 'vi') {
            hideVirtualKeyboard();
        } else {
            showVirtualKeyboard(newDefInput);
        }
    });

    closeVirtualKeyboardBtn.addEventListener('click', hideVirtualKeyboard);

    document.addEventListener('click', (e) => {
        if (!e.target.closest('.add-word-form') && !e.target.closest('.virtual-keyboard-container')) {
            hideVirtualKeyboard();
        }
    });

    // Phím tắt
    window.addEventListener('keydown', e => {
        if(panels.flashcard.classList.contains('active')) {
            if(e.key === 'ArrowLeft') { e.preventDefault(); goPrev(); }
            else if(e.key === 'ArrowRight') { e.preventDefault(); goNext(); }
            else if(e.key === ' ') { e.preventDefault(); toggleFlip(); }
        }
    });

    // Khởi động
    function init() {
        initDecks();
        const savedTheme = localStorage.getItem('flashcard_theme');
        if (savedTheme === 'dark') { darkMode = true; document.body.classList.add('dark-mode'); themeToggle.innerHTML = '<i class="fas fa-sun"></i>'; }
        languages.forEach(l => { const opt = document.createElement('option'); opt.value = l; opt.textContent = langNames[l]; if (l === currentLang) opt.selected = true; langSelect.appendChild(opt); });
        renderDeckTabs();
        updateAllDeckSelectors();
        renderFlashcard();
        renderWordList();
        loadQuiz();
        initVNKeys();
        updateIMEVisibility();
        initVirtualKeyboard();
    }
    init();
})();
</script>
</body>
</html>
