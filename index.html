<!DOCTYPE html>
<html lang="vi" translate="no">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <meta name="google" content="notranslate">
    <title>📚 Flashcard · Học tập thông minh</title>
    <!-- Fonts & Icons -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Quicksand:wght@500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            min-height: 100vh;
            font-family: 'Inter', 'Quicksand', system-ui, sans-serif;
            background: #f0f7ff;
            background-attachment: fixed;
            position: relative;
            display: flex;
            justify-content: center;
            padding: 16px 12px 28px;
            color: #1a2e4b;
            overflow-x: hidden;
            touch-action: pan-y;
            transition: background 0.3s, color 0.3s;
        }
        body.dark-mode { background: #0f172a; color: #e0e7ff; }
        body.dark-mode::before {
            background-image: 
                radial-gradient(circle at 30% 40%, rgba(80, 150, 255, 0.15) 0%, transparent 30%),
                radial-gradient(circle at 70% 60%, rgba(100, 200, 150, 0.1) 0%, transparent 35%),
                radial-gradient(circle at 50% 80%, rgba(255, 180, 100, 0.08) 0%, transparent 40%);
        }
        body::before {
            content: "";
            position: fixed;
            inset: 0;
            background-image: 
                radial-gradient(circle at 30% 40%, rgba(120, 180, 255, 0.08) 0%, transparent 30%),
                radial-gradient(circle at 70% 60%, rgba(80, 200, 140, 0.06) 0%, transparent 35%),
                radial-gradient(circle at 50% 80%, rgba(255, 200, 120, 0.05) 0%, transparent 40%);
            z-index: -2;
            pointer-events: none;
        }
        body::after {
            content: "";
            position: fixed;
            inset: 0;
            background-image: 
                linear-gradient(#a0b8d0 1px, transparent 1px),
                linear-gradient(90deg, #a0b8d0 1px, transparent 1px);
            background-size: 64px 64px;
            opacity: 0.06;
            pointer-events: none;
            z-index: -1;
        }
        body.dark-mode::after {
            background-image: 
                linear-gradient(#334155 1px, transparent 1px),
                linear-gradient(90deg, #334155 1px, transparent 1px);
            opacity: 0.1;
        }
        #app { max-width: 760px; width: 100%; display: flex; flex-direction: column; gap: 16px; position: relative; z-index: 2; touch-action: pan-y; }
        .app-bar {
            display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 12px;
            background: rgba(255, 255, 255, 0.75); backdrop-filter: blur(16px); padding: 12px 20px;
            border-radius: 60px; border: 1px solid rgba(255, 255, 255, 0.6);
            box-shadow: 0 12px 24px -12px rgba(0, 40, 80, 0.12);
        }
        body.dark-mode .app-bar { background: rgba(30, 41, 59, 0.8); border-color: rgba(255, 255, 255, 0.1); box-shadow: 0 12px 24px -12px rgba(0,0,0,0.4); }
        h1 {
            font-family: 'Quicksand', sans-serif; font-weight: 700; font-size: clamp(1.5rem, 6vw, 2rem);
            display: flex; align-items: center; gap: 8px; color: #1e3a5f;
        }
        body.dark-mode h1 { color: #e0e7ff; }
        h1 i { color: #2e7eb0; background: rgba(255, 255, 255, 0.7); padding: 8px; border-radius: 18px; backdrop-filter: blur(4px); border: 1px solid rgba(255, 255, 255, 0.8); }
        body.dark-mode h1 i { color: #94b9ff; background: rgba(30, 41, 59, 0.7); border-color: rgba(255,255,255,0.15); }
        .controls-group { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
        .lang-selector, .deck-selector {
            background: rgba(255, 255, 255, 0.6); backdrop-filter: blur(8px); padding: 8px 16px;
            border-radius: 40px; border: 1px solid rgba(255,255,255,0.8); font-weight: 600;
            color: #1e4d74; outline: none; cursor: pointer; font-size: 0.95rem;
        }
        body.dark-mode .lang-selector, body.dark-mode .deck-selector {
            background: rgba(30, 41, 59, 0.8); border-color: rgba(255,255,255,0.1); color: #cbd5e1;
        }
        .theme-toggle {
            background: rgba(255,255,255,0.6); border: 1px solid rgba(255,255,255,0.8);
            backdrop-filter: blur(8px); padding: 8px 12px; border-radius: 40px; cursor: pointer;
            color: #1e4d74; font-size: 1.2rem; display: flex; align-items: center;
        }
        body.dark-mode .theme-toggle { background: rgba(30,41,59,0.8); color: #fbbf24; border-color: rgba(255,255,255,0.1); }

        /* Tabs */
        .tabs-nav {
            display: flex; gap: 8px; background: rgba(255, 255, 255, 0.5); backdrop-filter: blur(12px);
            padding: 6px; border-radius: 60px; border: 1px solid rgba(255, 255, 255, 0.6);
        }
        body.dark-mode .tabs-nav { background: rgba(30, 41, 59, 0.6); border-color: rgba(255,255,255,0.1); }
        .tab-btn {
            flex: 1; border: none; background: transparent; padding: 14px 4px; border-radius: 50px;
            font-weight: 650; font-size: clamp(0.9rem, 4vw, 1.1rem); color: #3a5e7a; cursor: pointer;
            transition: all 0.2s; display: flex; align-items: center; justify-content: center; gap: 6px;
        }
        body.dark-mode .tab-btn { color: #b9c7da; }
        .tab-btn i { color: #2e7eb0; font-size: 1rem; }
        body.dark-mode .tab-btn i { color: #94b9ff; }
        .tab-btn.active { background: white; box-shadow: 0 8px 18px -8px #2e7eb030; color: #1a5f8a; font-weight: 700; }
        body.dark-mode .tab-btn.active { background: #1e293b; box-shadow: 0 8px 18px -8px #00000060; color: #e0e7ff; }
        .panel { display: none; animation: panelFade 0.3s; }
        .panel.active { display: block; }
        @keyframes panelFade { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: translateY(0); } }

        /* Flashcard (giữ nguyên) */
        .flashcard-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
        .card-stage { perspective: 2000px; margin: 8px 0; touch-action: pan-y; }
        .swipe-container { width: 100%; border-radius: 40px; transition: transform 0.2s; will-change: transform; }
        .card { width: 100%; aspect-ratio: 5 / 3.2; cursor: pointer; border-radius: 40px; }
        .card-inner { position: relative; width: 100%; height: 100%; transition: transform 0.5s; transform-style: preserve-3d; border-radius: 40px; box-shadow: 0 20px 35px -10px rgba(0,40,80,0.15), 0 0 0 1px rgba(255,255,255,0.6); }
        body.dark-mode .card-inner { box-shadow: 0 20px 35px -10px #00000080, 0 0 0 1px rgba(255,255,255,0.1); }
        .card.flipped .card-inner { transform: rotateY(180deg); }
        .card-front, .card-back {
            position: absolute; width: 100%; height: 100%; backface-visibility: hidden; border-radius: 40px;
            padding: 20px; display: flex; flex-direction: column; justify-content: center; align-items: center;
            background: rgba(255,255,255,0.9); backdrop-filter: blur(12px); border: 1px solid rgba(255,255,255,0.8);
            word-wrap: break-word; overflow-y: auto; user-select: none;
        }
        body.dark-mode .card-front { background: rgba(30, 41, 59, 0.9); border-color: rgba(255,255,255,0.1); }
        body.dark-mode .card-back { background: rgba(15, 23, 42, 0.9); border-color: rgba(255,255,255,0.1); }
        .card-front { background: linear-gradient(145deg, #fff, #f4faff); }
        .card-back { background: linear-gradient(145deg, #eef7fa, #e0edf5); transform: rotateY(180deg); }
        .card-label { font-size: 0.8rem; text-transform: uppercase; letter-spacing: 4px; font-weight: 600; color: #2c6b96; margin-bottom: 16px; background: rgba(255,255,255,0.7); padding: 6px 20px; border-radius: 40px; backdrop-filter: blur(4px); border: 1px solid rgba(255,255,255,0.8); user-select: none; }
        body.dark-mode .card-label { color: #bdd3ff; background: rgba(30,41,59,0.8); border-color: rgba(255,255,255,0.1); }
        .card-content { font-size: clamp(1.8rem, 10vw, 3.4rem); font-weight: 700; line-height: 1.25; color: #0b2b44; text-shadow: 0 2px 10px rgba(255,255,255,0.9); max-width: 100%; text-align: center; user-select: none; }
        body.dark-mode .card-content { color: #f0f4ff; text-shadow: 0 2px 10px rgba(0,0,0,0.5); }
        .swipe-hint { display: flex; justify-content: center; gap: 20px; margin: 12px 0 6px; color: #4f7396; font-size: 0.9rem; }
        body.dark-mode .swipe-hint { color: #9ab3d0; }
        .progress-area { display: flex; align-items: center; justify-content: space-between; margin: 12px 0; }
        .counter-badge { background: rgba(255,255,255,0.7); backdrop-filter: blur(8px); padding: 8px 20px; border-radius: 40px; font-weight: 600; border: 1px solid rgba(255,255,255,0.8); color: #1f4970; font-size: 0.95rem; }
        body.dark-mode .counter-badge { background: rgba(30,41,59,0.7); color: #cbd5e1; border-color: rgba(255,255,255,0.1); }
        .action-group { display: flex; flex-wrap: wrap; gap: 10px; justify-content: center; margin: 16px 0; }
        .btn {
            background: rgba(255,255,255,0.8); backdrop-filter: blur(8px); border: 1px solid rgba(255,255,255,0.9);
            padding: 10px 18px; border-radius: 50px; font-weight: 600; font-size: 0.95rem; color: #1e4d74;
            box-shadow: 0 8px 16px -8px rgba(0,40,80,0.1); display: inline-flex; align-items: center; gap: 6px;
            cursor: pointer; transition: all 0.2s;
        }
        body.dark-mode .btn { background: rgba(30,41,59,0.8); border-color: rgba(255,255,255,0.1); color: #e0e7ff; }
        .btn i { color: #2e7eb0; font-size: 1rem; }
        body.dark-mode .btn i { color: #94b9ff; }
        .btn:hover { background: white; transform: translateY(-2px); box-shadow: 0 12px 20px -10px #2e7eb040; }
        body.dark-mode .btn:hover { background: #1e293b; box-shadow: 0 12px 20px -10px #00000080; }
        .btn:active { transform: translateY(1px); }
        .btn:disabled { opacity: 0.4; pointer-events: none; }
        .btn-flip { background: #2e7eb0; color: white; border: none; min-width: 130px; }
        .btn-flip i { color: white; }
        body.dark-mode .btn-flip { background: #3b82f6; }

        /* Wordlist - thiết kế lại danh sách từ */
        .decks-bar {
            display: flex; flex-wrap: wrap; align-items: center; gap: 8px; margin-bottom: 16px;
            background: rgba(255,255,255,0.4); backdrop-filter: blur(8px); padding: 8px 10px;
            border-radius: 40px; border: 1px solid rgba(255,255,255,0.6);
        }
        body.dark-mode .decks-bar { background: rgba(30,41,59,0.5); border-color: rgba(255,255,255,0.1); }
        .deck-tabs { display: flex; flex-wrap: wrap; gap: 6px; flex: 1; }
        .deck-tab {
            background: rgba(255,255,255,0.6); border: none; padding: 8px 14px; border-radius: 30px;
            font-weight: 600; color: #1e4d74; cursor: pointer; backdrop-filter: blur(4px);
            border: 1px solid rgba(255,255,255,0.8); transition: 0.2s; display: flex; align-items: center; gap: 6px;
            font-size: 0.9rem;
        }
        body.dark-mode .deck-tab { background: rgba(30,41,59,0.8); color: #cbd5e1; border-color: rgba(255,255,255,0.1); }
        .deck-tab i { color: #2e7eb0; }
        .deck-tab.active { background: white; box-shadow: 0 6px 12px -6px #2e7eb040; color: #0e3a5c; }
        body.dark-mode .deck-tab.active { background: #1e293b; color: #e0e7ff; }
        .deck-tab .delete-deck { margin-left: 4px; opacity: 0.7; }
        .deck-tab .delete-deck:hover { color: #c24a4a; opacity: 1; }
        .add-deck-btn {
            background: #2e7eb0; color: white; border: none; padding: 8px 16px; border-radius: 30px;
            font-weight: 600; display: flex; align-items: center; gap: 6px; cursor: pointer; font-size: 0.9rem;
        }
        .add-deck-form {
            display: flex; flex-wrap: wrap; gap: 8px; margin-top: 8px; padding: 12px 14px;
            background: rgba(255,255,255,0.6); backdrop-filter: blur(12px); border-radius: 36px;
            border: 1px solid rgba(255,255,255,0.8);
        }
        body.dark-mode .add-deck-form { background: rgba(30,41,59,0.6); border-color: rgba(255,255,255,0.1); }
        .add-deck-form input, .add-deck-form select {
            padding: 8px 14px; border-radius: 30px; border: 1px solid #cbdbe9;
            background: white; font-size: 0.9rem; outline: none;
        }
        body.dark-mode .add-deck-form input, body.dark-mode .add-deck-form select {
            background: #0f172a; border-color: #334155; color: #e0e7ff;
        }
        .word-list-header { display: flex; justify-content: space-between; align-items: center; margin: 16px 0 10px; }
        .word-count { background: rgba(255,255,255,0.7); padding: 6px 16px; border-radius: 30px; font-weight: 600; border: 1px solid rgba(255,255,255,0.8); font-size: 0.9rem; }
        body.dark-mode .word-count { background: rgba(30,41,59,0.7); color: #cbd5e1; border-color: rgba(255,255,255,0.1); }
        .word-list {
            list-style: none; background: rgba(255,255,255,0.35); backdrop-filter: blur(16px);
            border-radius: 32px; padding: 8px 6px; max-height: 420px; overflow-y: auto;
            border: 1px solid rgba(255,255,255,0.5);
        }
        body.dark-mode .word-list { background: rgba(30,41,59,0.4); border-color: rgba(255,255,255,0.08); }
        .word-item {
            display: flex; align-items: center; padding: 14px 16px; margin: 6px 8px;
            background: rgba(255,255,255,0.7); border-radius: 24px; backdrop-filter: blur(4px);
            border: 1px solid rgba(255,255,255,0.8); transition: all 0.15s;
            box-shadow: 0 4px 8px -4px rgba(0,0,0,0.02);
        }
        body.dark-mode .word-item { background: rgba(30,41,59,0.7); border-color: rgba(255,255,255,0.05); }
        .word-item:hover { background: rgba(255,255,255,0.95); box-shadow: 0 8px 18px -8px #2e7eb030; transform: scale(1.01); }
        body.dark-mode .word-item:hover { background: #1e293b; }
        .word-index {
            width: 36px; height: 36px; display: flex; align-items: center; justify-content: center;
            background: #2e7eb0; color: white; border-radius: 18px; font-weight: 600; font-size: 0.9rem;
            margin-right: 16px; flex-shrink: 0;
        }
        body.dark-mode .word-index { background: #3b82f6; }
        .word-info { flex: 1; }
        .word-term { font-weight: 700; font-size: 1.25rem; color: #0e3a5c; user-select: none; line-height: 1.3; }
        body.dark-mode .word-term { color: #e0e7ff; }
        .word-def { color: #3a5f7a; margin-top: 4px; font-size: 0.95rem; user-select: none; }
        body.dark-mode .word-def { color: #b9c7da; }
        .item-actions { display: flex; gap: 8px; flex-shrink: 0; }
        .icon-btn {
            background: rgba(255,255,255,0.9); border: none; width: 42px; height: 42px; border-radius: 24px;
            display: flex; align-items: center; justify-content: center; font-size: 1.1rem; color: #1e4d74;
            cursor: pointer; backdrop-filter: blur(4px); border: 1px solid rgba(255,255,255,0.8);
            transition: all 0.15s;
        }
        body.dark-mode .icon-btn { background: rgba(30,41,59,0.8); color: #cbd5e1; border-color: rgba(255,255,255,0.1); }
        .icon-btn:hover { background: #e4eff9; color: #0b2b44; transform: scale(1.08); }
        body.dark-mode .icon-btn:hover { background: #1e293b; color: white; }

        .add-word-form {
            display: flex; flex-wrap: wrap; gap: 10px; margin-top: 20px; background: rgba(255,255,255,0.6);
            backdrop-filter: blur(16px); padding: 18px 16px; border-radius: 40px; border: 1px solid rgba(255,255,255,0.8);
        }
        body.dark-mode .add-word-form { background: rgba(30,41,59,0.6); border-color: rgba(255,255,255,0.1); }
        .add-word-form input { flex: 1 1 160px; padding: 14px 18px; border: none; border-radius: 40px; background: white; font-size: 1rem; outline: none; border: 1px solid #cbdbe9; }
        body.dark-mode .add-word-form input { background: #0f172a; border-color: #334155; color: #e0e7ff; }
        .add-word-form input:focus { border-color: #2e7eb0; box-shadow: 0 0 0 3px #2e7eb020; }

        /* Quiz */
        .quiz-container {
            background: rgba(255,255,255,0.65); backdrop-filter: blur(20px); border-radius: 40px;
            padding: 24px 20px; border: 1px solid rgba(255,255,255,0.8);
        }
        body.dark-mode .quiz-container { background: rgba(30,41,59,0.6); border-color: rgba(255,255,255,0.1); }
        .quiz-header {
            display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;
            flex-wrap: wrap; gap: 10px;
        }
        .quiz-deck-selector {
            padding: 8px 16px; border-radius: 30px; border: 1px solid #cbdbe9;
            background: white; font-weight: 500; color: #1e3a5f; outline: none; font-size: 0.9rem;
        }
        body.dark-mode .quiz-deck-selector { background: #0f172a; border-color: #334155; color: #e0e7ff; }
        .quiz-question { font-size: clamp(1.8rem, 8vw, 2.4rem); font-weight: 700; text-align: center; margin-bottom: 28px; color: #0e3a5c; }
        body.dark-mode .quiz-question { color: #e0e7ff; }
        .quiz-input { width: 100%; padding: 16px 20px; font-size: 1.2rem; border-radius: 50px; background: white; border: 1px solid #cbdbe9; color: #1a3e5c; margin-bottom: 20px; outline: none; }
        body.dark-mode .quiz-input { background: #0f172a; border-color: #334155; color: #e0e7ff; }
        .quiz-feedback { min-height: 50px; font-weight: 600; font-size: 1.1rem; }
        .quiz-feedback.correct { color: #1e8a5e; animation: bounce 0.5s; }
        .quiz-feedback.incorrect { color: #c24a4a; animation: shake 0.4s; }

        .empty-msg { text-align: center; padding: 40px; color: #5a7e9c; }
        body.dark-mode .empty-msg { color: #9ab3d0; }
        .toast-msg { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); background: #1e3a5f; color: white; padding: 12px 24px; border-radius: 50px; backdrop-filter: blur(12px); border: 1px solid #a0c4e0; z-index: 999; animation: toastIn 0.4s; font-size: 0.9rem; }
        body.dark-mode .toast-msg { background: #0f172a; border-color: #3b82f6; }
        @keyframes toastIn { from { opacity: 0; bottom: 0; } to { opacity: 1; bottom: 20px; } }
        .word-tip { margin-top: 12px; font-size: 0.85rem; opacity: 0.8; color: #3a5f7a; }
        body.dark-mode .word-tip { color: #b9c7da; }

        @media (max-width: 480px) {
            body { padding: 10px 8px 20px; }
            .btn { padding: 10px 16px; font-size: 0.9rem; }
            .tab-btn { padding: 12px 4px; }
            .word-index { width: 32px; height: 32px; font-size: 0.8rem; margin-right: 12px; }
            .word-term { font-size: 1.1rem; }
        }
    </style>
</head>
<body translate="no">
<div id="app">
    <div class="app-bar">
        <h1><i class="fas fa-layer-group"></i> <span id="appTitle">Flashcard</span></h1>
        <div class="controls-group">
            <select id="langSelector" class="lang-selector"></select>
            <button id="themeToggle" class="theme-toggle" title="Chuyển chế độ sáng/tối"><i class="fas fa-moon"></i></button>
        </div>
    </div>

    <div class="tabs-nav">
        <button class="tab-btn active" data-tab="flashcard"><i class="fas fa-clone"></i> <span data-i18n="study">Học</span></button>
        <button class="tab-btn" data-tab="wordlist"><i class="fas fa-list-ul"></i> <span data-i18n="words">Từ vựng</span></button>
        <button class="tab-btn" data-tab="quiz"><i class="fas fa-pencil"></i> <span data-i18n="quiz">Kiểm tra</span></button>
    </div>

    <!-- FLASHCARD PANEL -->
    <div id="panel-flashcard" class="panel active">
        <div class="flashcard-header">
            <select id="flashcardDeckSelector" class="deck-selector"></select>
            <span style="flex:1;"></span>
        </div>
        <div class="card-stage" id="cardStage">
            <div class="swipe-container" id="swipeContainer"><div id="cardScene"></div></div>
            <div class="swipe-hint"><i class="fas fa-chevron-left"></i><span data-i18n="swipeHint">Vuốt để chuyển</span><i class="fas fa-chevron-right"></i></div>
        </div>
        <div class="progress-area">
            <span class="counter-badge" id="counterDisplay">0/0</span>
            <button class="btn" id="deleteCardFlashBtn"><i class="fas fa-trash-alt"></i> <span data-i18n="delete">Xóa</span></button>
        </div>
        <div class="action-group">
            <button class="btn" id="prevBtn"><i class="fas fa-arrow-left"></i> <span data-i18n="prev">Trước</span></button>
            <button class="btn btn-flip" id="flipBtn"><i class="fas fa-sync-alt"></i> <span data-i18n="flip">Lật</span></button>
            <button class="btn" id="nextBtn"><span data-i18n="next">Tiếp</span> <i class="fas fa-arrow-right"></i></button>
            <button class="btn" id="randomFlashBtn"><i class="fas fa-shuffle"></i> <span data-i18n="random">Ngẫu nhiên</span></button>
        </div>
    </div>

    <!-- WORDLIST PANEL (thiết kế lại) -->
    <div id="panel-wordlist" class="panel">
        <div class="decks-bar">
            <div class="deck-tabs" id="deckTabsContainer"></div>
            <button class="add-deck-btn" id="showAddDeckFormBtn"><i class="fas fa-plus-circle"></i> Thêm bộ</button>
        </div>
        <div id="addDeckForm" class="add-deck-form" style="display: none;">
            <input type="text" id="newDeckName" placeholder="Tên bộ" style="flex:2;">
            <select id="newDeckLang" style="flex:1;">

<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
<script>
(function(){
    "use strict";
    // i18n
    const languages = ['vi', 'en', 'zh', 'ko', 'ja', 'fr', 'de', 'es', 'ru', 'it'];
    const langNames = { vi:'Tiếng Việt', en:'English', zh:'中文', ko:'한국어', ja:'日本語', fr:'Français', de:'Deutsch', es:'Español', ru:'Русский', it:'Italiano' };

        zh: { study:'学习', words:'单词', quiz:'测验', swipeHint:'滑动切换', delete:'删除', prev:'上一张', flip:'翻转', next:'下一张', random:'随机', export:'导出Word', add:'添加', termToDef:'单词→释义', defToTerm:'释义→单词', check:'检查', nextQ:'下一题', refresh:'刷新', edit:'编辑', cancel:'取消', update:'更新', empty:'暂无卡片', word:'单词', meaning:'释义', wordTip:'提示：.docx用Word打开。' },
        ko: { study:'학습', words:'단어', quiz:'퀴즈', swipeHint:'밀어서 변경', delete:'삭제', prev:'이전', flip:'뒤집기', next:'다음', random:'무작위', export:'Word 내보내기', add:'추가', termToDef:'단어→뜻', defToTerm:'뜻→단어', check:'확인', nextQ:'다음', refresh:'새로고침', edit:'편집', cancel:'취소', update:'업데이트', empty:'카드 없음', word:'단어', meaning:'뜻', wordTip:'팁: .docx는 Word로 엽니다.' },
        ja: { study:'学習', words:'単語', quiz:'テスト', swipeHint:'スワイプ', delete:'削除', prev:'前へ', flip:'裏返す', next:'次へ', random:'ランダム', export:'Word出力', add:'追加', termToDef:'単語→意味', defToTerm:'意味→単語', check:'確認', nextQ:'次へ', refresh:'更新', edit:'編集', cancel:'取消', update:'更新', empty:'カードなし', word:'単語', meaning:'意味', wordTip:'ヒント：.docxはWordで開く。' },
        fr: { study:'Apprendre', words:'Mots', quiz:'Quiz', swipeHint:'Glisser', delete:'Supprimer', prev:'Préc', flip:'Retourner', next:'Suiv', random:'Aléatoire', export:'Exporter Word', add:'Ajouter', termToDef:'Terme → Déf', defToTerm:'Déf → Terme', check:'Vérifier', nextQ:'Suivant', refresh:'Actualiser', edit:'Modifier', cancel:'Annuler', update:'Mettre à jour', empty:'Aucune carte', word:'Mot', meaning:'Signification', wordTip:'Astuce : .docx avec Word.' },
        de: { study:'Lernen', words:'Wörter', quiz:'Test', swipeHint:'Wischen', delete:'Löschen', prev:'Zurück', flip:'Umdrehen', next:'Weiter', random:'Zufall', export:'Word exportieren', add:'Hinzufügen', termToDef:'Wort → Def', defToTerm:'Def → Wort', check:'Prüfen', nextQ:'Nächste', refresh:'Aktualisieren', edit:'Bearbeiten', cancel:'Abbrechen', update:'Aktualisieren', empty:'Keine Karten', word:'Wort', meaning:'Bedeutung', wordTip:'Tipp: .docx mit Word öffnen.' },
        es: { study:'Estudiar', words:'Palabras', quiz:'Prueba', swipeHint:'Desliza', delete:'Eliminar', prev:'Anterior', flip:'Voltear', next:'Siguiente', random:'Aleatorio', export:'Exportar Word', add:'Añadir', termToDef:'Término → Def', defToTerm:'Def → Término', check:'Comprobar', nextQ:'Siguiente', refresh:'Actualizar', edit:'Editar', cancel:'Cancelar', update:'Actualizar', empty:'Sin tarjetas', word:'Palabra', meaning:'Significado', wordTip:'Consejo: .docx con Word.' },
        ru: { study:'Учить', words:'Слова', quiz:'Тест', swipeHint:'Свайп', delete:'Удалить', prev:'Пред', flip:'Перевернуть', next:'След', random:'Случайно', export:'Экспорт Word', add:'Добавить', termToDef:'Слово → Опред', defToTerm:'Опред → Слово', check:'Проверить', nextQ:'Далее', refresh:'Обновить', edit:'Ред', cancel:'Отмена', update:'Обновить', empty:'Нет карточек', word:'Слово', meaning:'Значение', wordTip:'Совет: .docx в Word.' },
        it: { study:'Studia', words:'Parole', quiz:'Quiz', swipeHint:'Scorri', delete:'Elimina', prev:'Prec', flip:'Gira', next:'Succ', random:'Casuale', export:'Esporta Word', add:'Aggiungi', termToDef:'Termine → Def', defToTerm:'Def → Termine', check:'Verifica', nextQ:'Prossimo', refresh:'Aggiorna', edit:'Modifica', cancel:'Annulla', update:'Aggiorna', empty:'Nessuna carta', word:'Parola', meaning:'Significato', wordTip:'Suggerimento: .docx con Word.' }
    };

    let currentLang = 'vi';
    let decks = {};
    let currentWordlistDeck = 'vi';
    let currentFlashcardDeck = 'vi';
    let currentQuizDeck = 'vi';
    let currentIndex = 0, isFlipped = false, editingIndex = -1;
    let quizMode = 'termToDef', currentQuizCard = null;
    let darkMode = false;

    // DOM elements
    const panels = { flashcard: document.getElementById('panel-flashcard'), wordlist: document.getElementById('panel-wordlist'), quiz: document.getElementById('panel-quiz') };
    const cardScene = document.getElementById('cardScene'), counterDisplay = document.getElementById('counterDisplay');
    const prevBtn = document.getElementById('prevBtn'), nextBtn = document.getElementById('nextBtn'), flipBtn = document.getElementById('flipBtn');
    const randomFlashBtn = document.getElementById('randomFlashBtn'), deleteCardFlashBtn = document.getElementById('deleteCardFlashBtn');
    const swipeContainer = document.getElementById('swipeContainer');
    const wordListContainer = document.getElementById('wordListContainer'), wordCountSpan = document.getElementById('wordCount');
    const newWordInput = document.getElementById('newWordInput'), newDefInput = document.getElementById('newDefInput');
    const addWordBtn = document.getElementById('addWordBtn'), cancelEditBtn = document.getElementById('cancelEditBtn');
    const exportWordBtn = document.getElementById('exportWordBtn');
    const deckTabsContainer = document.getElementById('deckTabsContainer');
    const showAddDeckFormBtn = document.getElementById('showAddDeckFormBtn'), addDeckForm = document.getElementById('addDeckForm');
    const newDeckName = document.getElementById('newDeckName'), newDeckLang = document.getElementById('newDeckLang');
    const confirmAddDeckBtn = document.getElementById('confirmAddDeckBtn'), cancelAddDeckBtn = document.getElementById('cancelAddDeckBtn');
    const quizQuestion = document.getElementById('quizQuestion'), quizAnswerInput = document.getElementById('quizAnswerInput'), quizFeedback = document.getElementById('quizFeedback');
    const submitQuizBtn = document.getElementById('submitQuizBtn'), nextQuizBtn = document.getElementById('nextQuizBtn'), newQuizBtn = document.getElementById('newQuizBtn');
    const modeTermToDef = document.getElementById('modeTermToDef'), modeDefToTerm = document.getElementById('modeDefToTerm');
    const quizDeckSelector = document.getElementById('quizDeckSelector');
    const flashcardDeckSelector = document.getElementById('flashcardDeckSelector');
    const langSelect = document.getElementById('langSelector');
    const themeToggle = document.getElementById('themeToggle');

    let touchStartX = 0, touchCurrentX = 0, isSwiping = false;
    const SWIPE_THRESHOLD = 50;

    function escapeHtml(t) { return String(t).replace(/[&<>]/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'})[c]); }

    // Cập nhật ngôn ngữ bàn phím cho ô nhập
    function setInputLanguage(lang) {
        newWordInput.setAttribute('lang', lang);
        newDefInput.setAttribute('lang', lang);
        newWordInput.setAttribute('inputmode', 'text');
        newDefInput.setAttribute('inputmode', 'text');
    }

    function initDecks() {
        const stored = localStorage.getItem('flashcard_decks_v9');
        if (stored) { try { decks = JSON.parse(stored); } catch(e){ setDefaultDecks(); } }
        else { setDefaultDecks(); }
        if (!decks || Object.keys(decks).length === 0) setDefaultDecks();
        if (!decks[currentWordlistDeck]) currentWordlistDeck = Object.keys(decks)[0];
        if (!decks[currentFlashcardDeck]) currentFlashcardDeck = currentWordlistDeck;
        if (!decks[currentQuizDeck]) currentQuizDeck = currentWordlistDeck;
    }
    function setDefaultDecks() {
        decks = {
            vi: { name: 'Tiếng Việt', cards: [{ question: "xin chào", answer: "hello" },{ question: "cảm ơn", answer: "thank you" }] },
            en: { name: 'English', cards: [{ question: "hello", answer: "xin chào" },{ question: "thank you", answer: "cảm ơn" }] }
        };
    }
    function saveDecks() { localStorage.setItem('flashcard_decks_v9', JSON.stringify(decks)); }

    function updateAllDeckSelectors() {
        const updateSelect = (selectEl, currentKey) => {
            selectEl.innerHTML = '';
            Object.keys(decks).forEach(key => {
                const opt = document.createElement('option'); opt.value = key;
                opt.textContent = `${decks[key].name} (${key})`;
                if (key === currentKey) opt.selected = true;
                selectEl.appendChild(opt);
            });
        };
        updateSelect(flashcardDeckSelector, currentFlashcardDeck);
        updateSelect(quizDeckSelector, currentQuizDeck);
    }

    function renderDeckTabs() {
        deckTabsContainer.innerHTML = '';
        Object.keys(decks).forEach(key => {
            const deck = decks[key];
            const tab = document.createElement('button');
            tab.className = `deck-tab ${key === currentWordlistDeck ? 'active' : ''}`;
            tab.innerHTML = `${deck.name} (${key}) <i class="fas fa-times delete-deck" data-deck="${key}"></i>`;
            tab.addEventListener('click', (e) => {
                if (e.target.classList.contains('delete-deck')) {
                    e.stopPropagation();
                    if (Object.keys(decks).length <= 1) { showToast('⚠️ Không thể xóa bộ duy nhất.'); return; }
                    delete decks[key];
                    saveDecks();
                    if (currentWordlistDeck === key) currentWordlistDeck = Object.keys(decks)[0];
                    if (currentFlashcardDeck === key) currentFlashcardDeck = currentWordlistDeck;
                    if (currentQuizDeck === key) currentQuizDeck = currentWordlistDeck;
                    renderDeckTabs(); updateAllDeckSelectors();
                    renderWordList(); renderFlashcard(); loadQuiz();
                    setInputLanguage(currentWordlistDeck);
                } else {
                    currentWordlistDeck = key;
                    renderDeckTabs(); renderWordList();
                    setInputLanguage(key);
                }
            });
            deckTabsContainer.appendChild(tab);
        });
    }

    function getCurrentFlashcardCards() { return decks[currentFlashcardDeck]?.cards || []; }
    function getCurrentWordlistCards() { return decks[currentWordlistDeck]?.cards || []; }

    function renderFlashcard() {
        const cards = getCurrentFlashcardCards();
        if (!cards.length) {
            cardScene.innerHTML = `<div class="empty-msg"><i class="far fa-folder-open"></i><br>${i18n[currentLang].empty}</div>`;
            counterDisplay.textContent = '0/0'; setFlashEnabled(false); return;
        }
        if (currentIndex < 0) currentIndex = 0;
        if (currentIndex >= cards.length) currentIndex = cards.length - 1;
        const card = cards[currentIndex];
        cardScene.innerHTML = `<div class="card ${isFlipped?'flipped':''}" id="flashcard"><div class="card-inner"><div class="card-front"><div class="card-label">${i18n[currentLang].word}</div><div class="card-content">${escapeHtml(card.question)}</div></div><div class="card-back"><div class="card-label">${i18n[currentLang].meaning}</div><div class="card-content">${escapeHtml(card.answer)}</div></div></div></div>`;
        document.getElementById('flashcard')?.addEventListener('click', ()=> { if(!isSwiping) toggleFlip(); });
        counterDisplay.textContent = `${currentIndex+1}/${cards.length}`;
        setFlashEnabled(true);
        prevBtn.disabled = currentIndex === 0;
        nextBtn.disabled = currentIndex === cards.length - 1;
    }
    function setFlashEnabled(e) { [prevBtn,nextBtn,flipBtn,randomFlashBtn,deleteCardFlashBtn].forEach(b=>b.disabled=!e); }
    function toggleFlip() { if(!getCurrentFlashcardCards().length) return; const el = document.getElementById('flashcard'); if(el) { isFlipped = !isFlipped; el.classList.toggle('flipped', isFlipped); } }

    function renderWordList() {
        const cards = getCurrentWordlistCards();
        if (!cards.length) { wordListContainer.innerHTML = `<li class="empty-msg">${i18n[currentLang].empty}</li>`; wordCountSpan.textContent = `0 ${i18n[currentLang].word}`; return; }
        wordCountSpan.textContent = `${cards.length} ${i18n[currentLang].word}`;
        let html = '';
        cards.forEach((c, i) => {
            html += `<li class="word-item">
                <span class="word-index">${i+1}</span>
                <div class="word-info"><div class="word-term">${escapeHtml(c.question)}</div><div class="word-def">${escapeHtml(c.answer)}</div></div>
                <div class="item-actions">
                    <button class="icon-btn edit-word" data-index="${i}"><i class="fas fa-pen"></i></button>
                    <button class="icon-btn delete-word" data-index="${i}"><i class="fas fa-trash"></i></button>
                </div>
            </li>`;
        });
        wordListContainer.innerHTML = html;
        wordListContainer.querySelectorAll('.delete-word').forEach(b => b.addEventListener('click', e => { const idx = b.dataset.index; if (idx !== undefined) { decks[currentWordlistDeck].cards.splice(idx, 1); saveDecks(); renderWordList(); if (currentWordlistDeck === currentFlashcardDeck) renderFlashcard(); updateAllDeckSelectors(); }}));
        wordListContainer.querySelectorAll('.edit-word').forEach(b => b.addEventListener('click', e => { const idx = b.dataset.index; if (idx !== undefined) { const c = decks[currentWordlistDeck].cards[idx]; newWordInput.value = c.question; newDefInput.value = c.answer; editingIndex = idx; addWordBtn.innerHTML = `<i class="fas fa-pen"></i> ${i18n[currentLang].update}`; cancelEditBtn.style.display = 'flex'; }}));
    }

    function addOrUpdateWord() {
        const q = newWordInput.value.trim(), a = newDefInput.value.trim(); if (!q || !a) return;
        const cards = decks[currentWordlistDeck].cards;
        if (editingIndex > -1) { cards[editingIndex] = { question: q, answer: a }; editingIndex = -1; addWordBtn.innerHTML = `<i class="fas fa-plus"></i> ${i18n[currentLang].add}`; cancelEditBtn.style.display = 'none'; }
        else { cards.push({ question: q, answer: a }); }
        saveDecks(); newWordInput.value = ''; newDefInput.value = ''; renderWordList();
        if (currentWordlistDeck === currentFlashcardDeck) renderFlashcard();
        updateAllDeckSelectors();
    }

    async function exportToDocx() {
        const cards = getCurrentWordlistCards(); if (!cards.length) { showToast('⚠️ Chưa có từ nào.'); return; }
        const Zip = new JSZip();
        let xmlRows = '';
        cards.forEach((c, idx) => {
            const bgColor = (idx % 2 === 0) ? 'FFFFFF' : 'F2F7FF';
            xmlRows += `<w:tr><w:tc><w:tcPr><w:shd w:val="clear" w:color="auto" w:fill="${bgColor}"/></w:tcPr><w:p><w:pPr><w:jc w:val="center"/></w:pPr><w:r><w:rPr><w:sz w:val="28"/></w:rPr><w:t>${escapeHtml(c.question)}</w:t></w:r></w:p></w:tc><w:tc><w:tcPr><w:shd w:val="clear" w:color="auto" w:fill="${bgColor}"/></w:tcPr><w:p><w:pPr><w:jc w:val="center"/></w:pPr><w:r><w:rPr><w:sz w:val="28"/></w:rPr><w:t>${escapeHtml(c.answer)}</w:t></w:r></w:p></w:tc></w:tr>`;
        });
        const documentXml = `<?xml version="1.0" encoding="UTF-8"?><w:document xmlns:w="http://schemas.openxmlformats.org/wordprocessingml/2006/main"><w:body><w:p><w:pPr><w:jc w:val="center"/></w:pPr><w:r><w:rPr><w:b/><w:sz w:val="48"/><w:color w:val="1E3A5F"/></w:rPr><w:t>📚 ${decks[currentWordlistDeck].name}</w:t></w:r></w:p><w:p/><w:tbl><w:tblPr><w:tblW w:w="0" w:type="auto"/><w:tblBorders><w:top w:val="single" w:sz="6" w:color="2E7EB0"/><w:left w:val="single" w:sz="6" w:color="2E7EB0"/><w:bottom w:val="single" w:sz="6" w:color="2E7EB0"/><w:right w:val="single" w:sz="6" w:color="2E7EB0"/></w:tblBorders></w:tblPr><w:tr><w:tc><w:tcPr><w:shd w:val="clear" w:color="auto" w:fill="2E7EB0"/></w:tcPr><w:p><w:pPr><w:jc w:val="center"/></w:pPr><w:r><w:rPr><w:b/><w:color w:val="FFFFFF"/><w:sz w:val="32"/></w:rPr><w:t>Từ</w:t></w:r></w:p></w:tc><w:tc><w:tcPr><w:shd w:val="clear" w:color="auto" w:fill="2E7EB0"/></w:tcPr><w:p><w:pPr><w:jc w:val="center"/></w:pPr><w:r><w:rPr><w:b/><w:color w:val="FFFFFF"/><w:sz w:val="32"/></w:rPr><w:t>Nghĩa</w:t></w:r></w:p></w:tc></w:tr>${xmlRows}</w:tbl><w:p/><w:p><w:r><w:rPr><w:i/><w:sz w:val="24"/></w:rPr><w:t>✨ Tạo bởi Flashcard App</w:t></w:r></w:p></w:body></w:document>`;
        Zip.file("word/document.xml", documentXml);
        Zip.file("_rels/.rels", `<?xml version="1.0"?><Relationships xmlns="http://schemas.openxmlformats.org/package/2006/relationships"><Relationship Id="rId1" Type="http://schemas.openxmlformats.org/officeDocument/2006/relationships/officeDocument" Target="word/document.xml"/></Relationships>`);
        Zip.file("[Content_Types].xml", `<?xml version="1.0"?><Types xmlns="http://schemas.openxmlformats.org/package/2006/content-types"><Default Extension="rels" ContentType="application/vnd.openxmlformats-package.relationships+xml"/><Default Extension="xml" ContentType="application/xml"/><Override PartName="/word/document.xml" ContentType="application/vnd.openxmlformats-officedocument.wordprocessingml.document.main+xml"/></Types>`);
        const blob = await Zip.generateAsync({type:"blob", mimeType:"application/vnd.openxmlformats-officedocument.wordprocessingml.document"});
        const a = document.createElement('a'); a.href = URL.createObjectURL(blob); a.download = `flashcard_${currentWordlistDeck}.docx`; a.click(); showToast('📄 File .docx đã sẵn sàng!');
    }

    function getQuizCards() { return decks[currentQuizDeck]?.cards || []; }
    function loadQuiz() {
        currentQuizCard = getQuizCards()[Math.floor(Math.random()*getQuizCards().length)] || null;
        if (!currentQuizCard) { quizQuestion.textContent = '—'; return; }
        quizQuestion.textContent = quizMode==='termToDef'? currentQuizCard.question : currentQuizCard.answer;
        quizAnswerInput.value = ''; quizFeedback.textContent = ''; quizFeedback.className = 'quiz-feedback';
    }
    function checkQuiz() {
        if(!currentQuizCard) return;
        const ans = quizAnswerInput.value.trim().toLowerCase();
        const correct = (quizMode==='termToDef'? currentQuizCard.answer : currentQuizCard.question).toLowerCase();
        const isCorrect = ans === correct;
        quizFeedback.textContent = isCorrect ? '✅ Chính xác!' : `❌ Đáp án: ${escapeHtml(quizMode==='termToDef'? currentQuizCard.answer : currentQuizCard.question)}`;
        quizFeedback.classList.add(isCorrect ? 'correct' : 'incorrect');
    }

    function goPrev() { const cards = getCurrentFlashcardCards(); if(cards.length && currentIndex>0) { currentIndex--; isFlipped=false; renderFlashcard(); } }
    function goNext() { const cards = getCurrentFlashcardCards(); if(cards.length && currentIndex<cards.length-1) { currentIndex++; isFlipped=false; renderFlashcard(); } }
    function goRandom() { const cards = getCurrentFlashcardCards(); if(cards.length>1) { let n; do{n=Math.floor(Math.random()*cards.length);}while(n===currentIndex); currentIndex=n; isFlipped=false; renderFlashcard(); } }
    function deleteCurrentFlash() {
        const cards = decks[currentFlashcardDeck].cards;
        if(!cards.length) return;
        cards.splice(currentIndex,1); saveDecks();
        if(!cards.length) { currentIndex=-1; renderFlashcard(); if(currentWordlistDeck===currentFlashcardDeck) renderWordList(); updateAllDeckSelectors(); return; }
        if(currentIndex>=cards.length) currentIndex=cards.length-1;
        isFlipped=false; renderFlashcard();
        if(currentWordlistDeck===currentFlashcardDeck) renderWordList();
        updateAllDeckSelectors();
    }

    function handleTouchStart(e) { if(!getCurrentFlashcardCards().length) return; touchStartX=e.touches[0].clientX; isSwiping=true; swipeContainer.style.transition='none'; }
    function handleTouchMove(e) { if(!isSwiping) return; touchCurrentX=e.touches[0].clientX; let dx=touchCurrentX-touchStartX; dx=Math.max(-120, Math.min(120,dx)); swipeContainer.style.transform=`translateX(${dx}px)`; }
    function handleTouchEnd() { if(!isSwiping) return; isSwiping=false; const dx = touchCurrentX - touchStartX; swipeContainer.style.transition = 'transform 0.25s'; if (Math.abs(dx) > SWIPE_THRESHOLD) { if (dx > 0 && currentIndex > 0) { swipeContainer.style.transform = 'translateX(130%) scale(0.95)'; setTimeout(()=>{ goPrev(); swipeContainer.style.transition=''; swipeContainer.style.transform=''; },200); } else if (dx < 0 && currentIndex < getCurrentFlashcardCards().length-1) { swipeContainer.style.transform = 'translateX(-130%) scale(0.95)'; setTimeout(()=>{ goNext(); swipeContainer.style.transition=''; swipeContainer.style.transform=''; },200); } else { swipeContainer.style.transform='translateX(0)'; setTimeout(()=>swipeContainer.style.transition='',200); } } else { swipeContainer.style.transform='translateX(0)'; setTimeout(()=>swipeContainer.style.transition='',200); } }

    function showToast(msg) { const toast = document.createElement('div'); toast.className='toast-msg'; toast.textContent=msg; document.body.appendChild(toast); setTimeout(()=>toast.remove(), 3000); }

    function updateUITexts() {
        document.querySelectorAll('[data-i18n]').forEach(el => { const key = el.dataset.i18n; if(i18n[currentLang]?.[key]) el.textContent = i18n[currentLang][key]; });
        document.getElementById('appTitle').textContent = 'Flashcard';
    }

    function toggleTheme() {
        darkMode = !darkMode;
        document.body.classList.toggle('dark-mode', darkMode);
        themeToggle.innerHTML = darkMode ? '<i class="fas fa-sun"></i>' : '<i class="fas fa-moon"></i>';
        localStorage.setItem('flashcard_theme', darkMode ? 'dark' : 'light');
    }

    function init() {
        initDecks();
        const savedTheme = localStorage.getItem('flashcard_theme');
        if (savedTheme === 'dark') { darkMode = true; document.body.classList.add('dark-mode'); themeToggle.innerHTML = '<i class="fas fa-sun"></i>'; }
        renderDeckTabs(); updateAllDeckSelectors();
        setInputLanguage(currentWordlistDeck);
        renderFlashcard(); renderWordList(); loadQuiz();

        languages.forEach(l => { const opt = document.createElement('option'); opt.value = l; opt.textContent = langNames[l]; if (l === currentLang) opt.selected = true; langSelect.appendChild(opt); });
        langSelect.addEventListener('change', (e) => { currentLang = e.target.value; updateUITexts(); renderFlashcard(); renderWordList(); loadQuiz(); });
        updateUITexts();

        themeToggle.addEventListener('click', toggleTheme);
        flashcardDeckSelector.addEventListener('change', (e) => { currentFlashcardDeck = e.target.value; currentIndex = 0; isFlipped = false; renderFlashcard(); });
        quizDeckSelector.addEventListener('change', (e) => { currentQuizDeck = e.target.value; loadQuiz(); });

        showAddDeckFormBtn.addEventListener('click', ()=> { addDeckForm.style.display = 'flex'; newDeckName.focus(); });
        cancelAddDeckBtn.addEventListener('click', ()=> { addDeckForm.style.display = 'none'; newDeckName.value = ''; });
        confirmAddDeckBtn.addEventListener('click', ()=>{
            const name = newDeckName.value.trim(), lang = newDeckLang.value;
            if (!name) { showToast('⚠️ Vui lòng nhập tên bộ'); return; }
            if (decks[lang]) { showToast('⚠️ Bộ với mã ngôn ngữ này đã tồn tại'); return; }
            decks[lang] = { name: name, cards: [] }; saveDecks(); renderDeckTabs(); updateAllDeckSelectors();
            currentWordlistDeck = lang; renderDeckTabs(); renderWordList();
            setInputLanguage(lang);
            addDeckForm.style.display = 'none'; newDeckName.value = ''; showToast(`✅ Đã tạo bộ "${name}"`);
        });

        document.querySelectorAll('.tab-btn').forEach(b => b.addEventListener('click', ()=>{
            const tab = b.dataset.tab;
            Object.values(panels).forEach(p => p.classList.remove('active')); panels[tab].classList.add('active');
            document.querySelectorAll('.tab-btn').forEach(t => t.classList.toggle('active', t.dataset.tab===tab));
            if (tab === 'flashcard') renderFlashcard();
            if (tab === 'wordlist') { renderWordList(); setInputLanguage(currentWordlistDeck); }
            if (tab === 'quiz') loadQuiz();
        }));

        prevBtn.addEventListener('click', goPrev); nextBtn.addEventListener('click', goNext); flipBtn.addEventListener('click', toggleFlip);
        randomFlashBtn.addEventListener('click', goRandom); deleteCardFlashBtn.addEventListener('click', deleteCurrentFlash);
        addWordBtn.addEventListener('click', addOrUpdateWord); cancelEditBtn.addEventListener('click', ()=>{
            editingIndex = -1; newWordInput.value = ''; newDefInput.value = ''; addWordBtn.innerHTML = `<i class="fas fa-plus"></i> ${i18n[currentLang].add}`; cancelEditBtn.style.display = 'none';
        });
        exportWordBtn.addEventListener('click', exportToDocx);

        const stage = document.getElementById('cardStage');
        stage.addEventListener('touchstart', handleTouchStart, {passive:true}); stage.addEventListener('touchmove', handleTouchMove, {passive:true}); stage.addEventListener('touchend', handleTouchEnd);

        window.addEventListener('keydown', e => { if(panels.flashcard.classList.contains('active')){ if(e.key==='ArrowLeft'){e.preventDefault(); goPrev();} else if(e.key==='ArrowRight'){e.preventDefault(); goNext();} else if(e.key===' '){e.preventDefault(); toggleFlip();} } });

        submitQuizBtn.addEventListener('click', checkQuiz); nextQuizBtn.addEventListener('click', loadQuiz); newQuizBtn.addEventListener('click', loadQuiz);
        modeTermToDef.addEventListener('click', ()=>{ quizMode='termToDef'; modeTermToDef.classList.add('active'); modeDefToTerm.classList.remove('active'); loadQuiz(); });
        modeDefToTerm.addEventListener('click', ()=>{ quizMode='defToTerm'; modeDefToTerm.classList.add('active'); modeTermToDef.classList.remove('active'); loadQuiz(); });
    }

    init();
})();
</script>
</body>
</html>
