<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>📚 Flashcard · Học tập thông minh</title>
    <!-- Fonts & Icons -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Quicksand:wght@500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            min-height: 100vh;
            font-family: 'Inter', 'Quicksand', system-ui, sans-serif;
            background: linear-gradient(145deg, #f0f7ff 0%, #e6f0fa 100%);
            background-attachment: fixed;
            position: relative;
            display: flex;
            justify-content: center;
            padding: 20px 16px 32px;
            color: #1a2e4b;
        }
        body::before {
            content: "";
            position: fixed;
            inset: 0;
            background-image: 
                radial-gradient(circle at 30% 40%, rgba(120, 180, 255, 0.08) 0%, transparent 30%),
                radial-gradient(circle at 70% 60%, rgba(80, 200, 140, 0.06) 0%, transparent 35%),
                radial-gradient(circle at 50% 80%, rgba(255, 200, 120, 0.05) 0%, transparent 40%);
            z-index: -2;
            pointer-events: none;
        }
        body::after {
            content: "";
            position: fixed;
            inset: 0;
            background-image: 
                linear-gradient(#a0b8d0 1px, transparent 1px),
                linear-gradient(90deg, #a0b8d0 1px, transparent 1px);
            background-size: 64px 64px;
            opacity: 0.06;
            pointer-events: none;
            z-index: -1;
        }
        #app {
            max-width: 760px;
            width: 100%;
            display: flex;
            flex-direction: column;
            gap: 18px;
            position: relative;
            z-index: 2;
        }
        /* Header */
        .app-bar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 12px;
            background: rgba(255, 255, 255, 0.75);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            padding: 14px 24px;
            border-radius: 60px;
            border: 1px solid rgba(255, 255, 255, 0.6);
            box-shadow: 0 12px 24px -12px rgba(0, 40, 80, 0.12);
        }
        h1 {
            font-family: 'Quicksand', sans-serif;
            font-weight: 700;
            font-size: 2rem;
            display: flex;
            align-items: center;
            gap: 12px;
            color: #1e3a5f;
        }
        h1 i { color: #2e7eb0; background: rgba(255, 255, 255, 0.7); padding: 10px; border-radius: 20px; backdrop-filter: blur(4px); border: 1px solid rgba(255, 255, 255, 0.8); }
        .controls-group { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }
        .lang-selector {
            display: flex; gap: 6px; background: rgba(255, 255, 255, 0.5); backdrop-filter: blur(12px);
            padding: 6px 10px; border-radius: 48px; border: 1px solid rgba(255, 255, 255, 0.7);
        }
        .lang-btn {
            border: none; background: transparent; padding: 8px 14px; border-radius: 36px;
            font-weight: 600; font-size: 0.9rem; color: #2c4c6e; cursor: pointer; transition: all 0.2s;
        }
        .lang-btn.active { background: white; box-shadow: 0 6px 14px -6px #2e7eb040; color: #1e6fa3; font-weight: 700; }

        /* Tabs chính */
        .tabs-nav {
            display: flex; gap: 10px; background: rgba(255, 255, 255, 0.5); backdrop-filter: blur(12px);
            padding: 8px; border-radius: 60px; border: 1px solid rgba(255, 255, 255, 0.6);
        }
        .tab-btn {
            flex: 1; border: none; background: transparent; padding: 16px 6px; border-radius: 50px;
            font-weight: 650; font-size: 1.1rem; color: #3a5e7a; cursor: pointer; transition: all 0.2s;
            display: flex; align-items: center; justify-content: center; gap: 10px;
        }
        .tab-btn i { color: #2e7eb0; }
        .tab-btn.active { background: white; box-shadow: 0 8px 18px -8px #2e7eb030; color: #1a5f8a; font-weight: 700; }
        .panel { display: none; animation: panelFade 0.3s; }
        .panel.active { display: block; }
        @keyframes panelFade { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: translateY(0); } }

        /* Flashcard */
        .card-stage { perspective: 2000px; margin: 10px 0; }
        .swipe-container { width: 100%; border-radius: 48px; transition: transform 0.2s; will-change: transform; }
        .card { width: 100%; aspect-ratio: 5 / 3.2; cursor: pointer; border-radius: 48px; }
        .card-inner { position: relative; width: 100%; height: 100%; transition: transform 0.5s; transform-style: preserve-3d; border-radius: 48px; box-shadow: 0 20px 35px -10px rgba(0,40,80,0.15), 0 0 0 1px rgba(255,255,255,0.6); }
        .card.flipped .card-inner { transform: rotateY(180deg); }
        .card-front, .card-back {
            position: absolute; width: 100%; height: 100%; backface-visibility: hidden; border-radius: 48px;
            padding: 30px 28px; display: flex; flex-direction: column; justify-content: center; align-items: center;
            background: rgba(255,255,255,0.9); backdrop-filter: blur(12px); border: 1px solid rgba(255,255,255,0.8);
            word-wrap: break-word; overflow-y: auto; user-select: none;
        }
        .card-front { background: linear-gradient(145deg, #fff, #f4faff); }
        .card-back { background: linear-gradient(145deg, #eef7fa, #e0edf5); transform: rotateY(180deg); }
        .card-label { font-size: 0.9rem; text-transform: uppercase; letter-spacing: 5px; font-weight: 600; color: #2c6b96; margin-bottom: 24px; background: rgba(255,255,255,0.7); padding: 8px 28px; border-radius: 60px; backdrop-filter: blur(4px); border: 1px solid rgba(255,255,255,0.8); user-select: none; }
        .card-content { font-size: clamp(2rem, 10vw, 3.6rem); font-weight: 700; line-height: 1.25; color: #0b2b44; text-shadow: 0 2px 10px rgba(255,255,255,0.9); max-width: 100%; text-align: center; user-select: none; }
        .swipe-hint { display: flex; justify-content: center; gap: 28px; margin: 18px 0 8px; color: #4f7396; }
        .progress-area { display: flex; align-items: center; justify-content: space-between; margin: 16px 0; }
        .counter-badge { background: rgba(255,255,255,0.7); backdrop-filter: blur(8px); padding: 10px 28px; border-radius: 60px; font-weight: 600; border: 1px solid rgba(255,255,255,0.8); color: #1f4970; }
        .action-group { display: flex; flex-wrap: wrap; gap: 14px; justify-content: center; margin: 20px 0; }
        .btn {
            background: rgba(255,255,255,0.8); backdrop-filter: blur(8px); border: 1px solid rgba(255,255,255,0.9);
            padding: 12px 22px; border-radius: 60px; font-weight: 600; font-size: 1rem; color: #1e4d74;
            box-shadow: 0 8px 16px -8px rgba(0,40,80,0.1); display: inline-flex; align-items: center; gap: 8px;
            cursor: pointer; transition: all 0.2s;
        }
        .btn i { color: #2e7eb0; }
        .btn:hover { background: white; transform: translateY(-2px); box-shadow: 0 12px 20px -10px #2e7eb040; }
        .btn:active { transform: translateY(1px); }
        .btn:disabled { opacity: 0.4; pointer-events: none; }
        .btn-flip { background: #2e7eb0; color: white; border: none; min-width: 150px; }
        .btn-flip i { color: white; }

        /* Panel Từ vựng */
        .decks-bar {
            display: flex; flex-wrap: wrap; align-items: center; gap: 10px; margin-bottom: 18px;
            background: rgba(255,255,255,0.4); backdrop-filter: blur(8px); padding: 8px 12px;
            border-radius: 48px; border: 1px solid rgba(255,255,255,0.6);
        }
        .deck-tabs {
            display: flex; flex-wrap: wrap; gap: 8px; flex: 1;
        }
        .deck-tab {
            background: rgba(255,255,255,0.6); border: none; padding: 10px 18px; border-radius: 36px;
            font-weight: 600; color: #1e4d74; cursor: pointer; backdrop-filter: blur(4px);
            border: 1px solid rgba(255,255,255,0.8); transition: 0.2s; display: flex; align-items: center; gap: 8px;
        }
        .deck-tab i { color: #2e7eb0; }
        .deck-tab.active { background: white; box-shadow: 0 6px 12px -6px #2e7eb040; color: #0e3a5c; }
        .deck-tab .delete-deck { margin-left: 8px; opacity: 0.7; }
        .deck-tab .delete-deck:hover { color: #c24a4a; opacity: 1; }
        .add-deck-btn {
            background: #2e7eb0; color: white; border: none; padding: 10px 20px; border-radius: 36px;
            font-weight: 600; display: flex; align-items: center; gap: 8px; cursor: pointer;
        }
        .add-deck-form {
            display: flex; flex-wrap: wrap; gap: 8px; margin-top: 8px; padding: 12px 16px;
            background: rgba(255,255,255,0.6); backdrop-filter: blur(12px); border-radius: 40px;
            border: 1px solid rgba(255,255,255,0.8);
        }
        .add-deck-form input, .add-deck-form select {
            padding: 10px 16px; border-radius: 30px; border: 1px solid #cbdbe9;
            background: white; font-size: 0.95rem; outline: none;
        }
        .add-deck-form input:focus, .add-deck-form select:focus { border-color: #2e7eb0; box-shadow: 0 0 0 3px #2e7eb020; }
        .word-list-header { display: flex; justify-content: space-between; align-items: center; margin: 20px 0 12px; }
        .word-count { background: rgba(255,255,255,0.7); padding: 8px 20px; border-radius: 40px; font-weight: 600; border: 1px solid rgba(255,255,255,0.8); }
        .word-list {
            list-style: none; background: rgba(255,255,255,0.5); backdrop-filter: blur(16px);
            border-radius: 36px; padding: 8px 0; max-height: 400px; overflow-y: auto;
            border: 1px solid rgba(255,255,255,0.7);
        }
        .word-item { display: flex; align-items: center; padding: 18px 22px; margin: 6px 12px; background: rgba(255,255,255,0.5); border-radius: 32px; backdrop-filter: blur(4px); border: 1px solid rgba(255,255,255,0.6); }
        .word-item:hover { background: rgba(255,255,255,0.9); box-shadow: 0 8px 16px -8px #2e7eb030; }
        .word-info { flex: 1; }
        .word-term { font-weight: 700; font-size: 1.3rem; color: #0e3a5c; user-select: none; }
        .word-def { color: #3a5f7a; margin-top: 4px; user-select: none; }
        .item-actions { display: flex; gap: 10px; }
        .icon-btn { background: rgba(255,255,255,0.8); border: none; width: 44px; height: 44px; border-radius: 30px; display: flex; align-items: center; justify-content: center; font-size: 1.2rem; color: #1e4d74; cursor: pointer; backdrop-filter: blur(4px); border: 1px solid rgba(255,255,255,0.8); }
        .icon-btn:hover { background: #e4eff9; color: #0b2b44; transform: scale(1.05); }
        .add-word-form {
            display: flex; flex-wrap: wrap; gap: 12px; margin-top: 22px; background: rgba(255,255,255,0.6);
            backdrop-filter: blur(16px); padding: 22px 20px; border-radius: 48px; border: 1px solid rgba(255,255,255,0.8);
        }
        .add-word-form input { flex: 1 1 180px; padding: 14px 20px; border: none; border-radius: 60px; background: white; font-size: 1rem; outline: none; border: 1px solid #cbdbe9; }
        .add-word-form input:focus { border-color: #2e7eb0; box-shadow: 0 0 0 3px #2e7eb020; }

        /* Quiz */
        .quiz-container {
            background: rgba(255,255,255,0.65); backdrop-filter: blur(20px); border-radius: 48px;
            padding: 30px 28px; border: 1px solid rgba(255,255,255,0.8);
        }
        .quiz-header {
            display: flex; justify-content: space-between; align-items: center; margin-bottom: 24px;
            flex-wrap: wrap; gap: 12px;
        }
        .quiz-deck-selector {
            padding: 10px 18px; border-radius: 40px; border: 1px solid #cbdbe9;
            background: white; font-weight: 500; color: #1e3a5f; outline: none;
        }
        .quiz-question { font-size: 2.6rem; font-weight: 700; text-align: center; margin-bottom: 36px; color: #0e3a5c; }
        .quiz-input { width: 100%; padding: 20px 26px; font-size: 1.4rem; border-radius: 60px; background: white; border: 1px solid #cbdbe9; color: #1a3e5c; margin-bottom: 28px; outline: none; }
        .quiz-feedback { min-height: 60px; font-weight: 600; font-size: 1.3rem; }
        .quiz-feedback.correct { color: #1e8a5e; animation: bounce 0.5s; }
        .quiz-feedback.incorrect { color: #c24a4a; animation: shake 0.4s; }
        @keyframes bounce { 0%,100%{ transform: translateY(0); } 50%{ transform: translateY(-6px); } }
        @keyframes shake { 0%,100%{ transform: translateX(0); } 25%{ transform: translateX(-6px); } 75%{ transform: translateX(6px); } }
        .quiz-actions { display: flex; gap: 14px; flex-wrap: wrap; }
        .quiz-mode { display: flex; gap: 14px; justify-content: center; margin-bottom: 28px; }

        .empty-msg { text-align: center; padding: 40px; color: #5a7e9c; }
        .toast-msg { position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%); background: #1e3a5f; color: white; padding: 14px 28px; border-radius: 60px; backdrop-filter: blur(12px); border: 1px solid #a0c4e0; z-index: 999; animation: toastIn 0.4s; }
        @keyframes toastIn { from { opacity: 0; bottom: 0; } to { opacity: 1; bottom: 24px; } }
        .word-tip { margin-top: 12px; font-size: 0.9rem; opacity: 0.8; color: #3a5f7a; }
    </style>
</head>
<body>
<div id="app">
    <div class="app-bar">
        <h1><i class="fas fa-layer-group"></i> <span id="appTitle">Flashcard</span></h1>
        <div class="controls-group">
            <div class="lang-selector" id="langSelector"></div>
        </div>
    </div>

    <div class="tabs-nav">
        <button class="tab-btn active" data-tab="flashcard"><i class="fas fa-clone"></i> <span data-i18n="study">Học</span></button>
        <button class="tab-btn" data-tab="wordlist"><i class="fas fa-list-ul"></i> <span data-i18n="words">Từ vựng</span></button>
        <button class="tab-btn" data-tab="quiz"><i class="fas fa-pencil"></i> <span data-i18n="quiz">Kiểm tra</span></button>
    </div>

    <!-- FLASHCARD PANEL -->
    <div id="panel-flashcard" class="panel active">
        <div class="card-stage" id="cardStage">
            <div class="swipe-container" id="swipeContainer"><div id="cardScene"></div></div>
            <div class="swipe-hint"><i class="fas fa-chevron-left"></i><span data-i18n="swipeHint">Vuốt để chuyển</span><i class="fas fa-chevron-right"></i></div>
        </div>
        <div class="progress-area">
            <span class="counter-badge" id="counterDisplay">0/0</span>
            <button class="btn" id="deleteCardFlashBtn"><i class="fas fa-trash-alt"></i> <span data-i18n="delete">Xóa</span></button>
        </div>
        <div class="action-group">
            <button class="btn" id="prevBtn"><i class="fas fa-arrow-left"></i> <span data-i18n="prev">Trước</span></button>
            <button class="btn btn-flip" id="flipBtn"><i class="fas fa-sync-alt"></i> <span data-i18n="flip">Lật</span></button>
            <button class="btn" id="nextBtn"><span data-i18n="next">Tiếp</span> <i class="fas fa-arrow-right"></i></button>
            <button class="btn" id="randomFlashBtn"><i class="fas fa-shuffle"></i> <span data-i18n="random">Ngẫu nhiên</span></button>
        </div>
    </div>

    <!-- WORDLIST PANEL -->
    <div id="panel-wordlist" class="panel">
        <div class="decks-bar">
            <div class="deck-tabs" id="deckTabsContainer"></div>
            <button class="add-deck-btn" id="showAddDeckFormBtn"><i class="fas fa-plus-circle"></i> Thêm bộ</button>
        </div>
        <div id="addDeckForm" class="add-deck-form" style="display: none;">
            <input type="text" id="newDeckName" placeholder="Tên bộ (VD: Tiếng Pháp)" style="flex:2;">
            <select id="newDeckLang" style="flex:1;">
                <option value="vi">Tiếng Việt</option><option value="en">English</option><option value="zh">中文</option>
                <option value="ko">한국어</option><option value="ja">日本語</option><option value="fr">Français</option>
                <option value="de">Deutsch</option><option value="es">Español</option><option value="ru">Русский</option><option value="it">Italiano</option>
            </select>
            <button class="btn" id="confirmAddDeckBtn"><i class="fas fa-check"></i> Tạo</button>
            <button class="btn" id="cancelAddDeckBtn"><i class="fas fa-times"></i> Huỷ</button>
        </div>
        <div class="word-list-header">
            <span class="word-count" id="wordCount">0 từ</span>
            <button class="btn" id="exportWordBtn"><i class="fas fa-file-word"></i> <span data-i18n="export">Xuất Word</span></button>
        </div>
        <ul class="word-list" id="wordListContainer"></ul>
        <div class="add-word-form">
            <input type="text" id="newWordInput" placeholder="Từ" maxlength="80">
            <input type="text" id="newDefInput" placeholder="Nghĩa" maxlength="120">
            <button class="btn" id="addWordBtn" style="background:#2e7eb0; color:white;"><i class="fas fa-plus"></i> <span data-i18n="add">Thêm</span></button>
            <button class="btn" id="cancelEditBtn" style="display:none;"><i class="fas fa-times"></i> Huỷ</button>
        </div>
        <div class="word-tip"><i class="far fa-lightbulb"></i> <span data-i18n="wordTip">Mẹo: File Word (.docx) mở bằng Microsoft Word.</span></div>
    </div>

    <!-- QUIZ PANEL -->
    <div id="panel-quiz" class="panel">
        <div class="quiz-container">
            <div class="quiz-header">
                <div class="quiz-mode">
                    <button class="btn active" id="modeTermToDef"><i class="fas fa-arrow-right"></i> <span data-i18n="termToDef">Từ → Nghĩa</span></button>
                    <button class="btn" id="modeDefToTerm"><i class="fas fa-arrow-left"></i> <span data-i18n="defToTerm">Nghĩa → Từ</span></button>
                </div>
                <select id="quizDeckSelector" class="quiz-deck-selector"></select>
            </div>
            <div class="quiz-question" id="quizQuestion">—</div>
            <input type="text" id="quizAnswerInput" class="quiz-input" placeholder="Nhập câu trả lời...">
            <div class="quiz-feedback" id="quizFeedback"></div>
            <div class="quiz-actions">
                <button class="btn" id="submitQuizBtn"><i class="fas fa-check"></i> <span data-i18n="check">Kiểm tra</span></button>
                <button class="btn" id="nextQuizBtn"><i class="fas fa-forward"></i> <span data-i18n="nextQ">Câu tiếp</span></button>
                <button class="btn" id="newQuizBtn"><i class="fas fa-arrows-rotate"></i> <span data-i18n="refresh">Làm mới</span></button>
            </div>
        </div>
    </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>

    let currentLang = 'vi';
    let decks = {};
    let currentDeckKey = 'vi';
    let currentIndex = 0, isFlipped = false, editingIndex = -1;
    let quizMode = 'termToDef';
    let currentQuizCard = null;
    let currentQuizDeckKey = 'vi';

    // DOM (lược bớt để tránh dài dòng)
    const panels = {
        flashcard: document.getElementById('panel-flashcard'),
        wordlist: document.getElementById('panel-wordlist'),
        quiz: document.getElementById('panel-quiz')
    };
    const cardScene = document.getElementById('cardScene'), counterDisplay = document.getElementById('counterDisplay');
    const prevBtn = document.getElementById('prevBtn'), nextBtn = document.getElementById('nextBtn'), flipBtn = document.getElementById('flipBtn');
    const randomFlashBtn = document.getElementById('randomFlashBtn'), deleteCardFlashBtn = document.getElementById('deleteCardFlashBtn');
    const swipeContainer = document.getElementById('swipeContainer');
    const wordListContainer = document.getElementById('wordListContainer'), wordCountSpan = document.getElementById('wordCount');
    const newWordInput = document.getElementById('newWordInput'), newDefInput = document.getElementById('newDefInput');
    const addWordBtn = document.getElementById('addWordBtn'), cancelEditBtn = document.getElementById('cancelEditBtn');
    const exportWordBtn = document.getElementById('exportWordBtn');
    const deckTabsContainer = document.getElementById('deckTabsContainer');
    const showAddDeckFormBtn = document.getElementById('showAddDeckFormBtn');
    const addDeckForm = document.getElementById('addDeckForm');
    const newDeckName = document.getElementById('newDeckName'), newDeckLang = document.getElementById('newDeckLang');
    const confirmAddDeckBtn = document.getElementById('confirmAddDeckBtn'), cancelAddDeckBtn = document.getElementById('cancelAddDeckBtn');
    const quizQuestion = document.getElementById('quizQuestion'), quizAnswerInput = document.getElementById('quizAnswerInput'), quizFeedback = document.getElementById('quizFeedback');
    const submitQuizBtn = document.getElementById('submitQuizBtn'), nextQuizBtn = document.getElementById('nextQuizBtn'), newQuizBtn = document.getElementById('newQuizBtn');
    const modeTermToDef = document.getElementById('modeTermToDef'), modeDefToTerm = document.getElementById('modeDefToTerm');
    const quizDeckSelector = document.getElementById('quizDeckSelector');

    let touchStartX = 0, touchCurrentX = 0, isSwiping = false;
    const SWIPE_THRESHOLD = 50;

    function escapeHtml(t) { return String(t).replace(/[&<>]/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'})[c]); }

    // Decks
    function initDecks() {
        const stored = localStorage.getItem('flashcard_decks_v5');
        if (stored) {
            try { decks = JSON.parse(stored); } catch(e){ setDefaultDecks(); }
        } else { setDefaultDecks(); }
        if (!decks || Object.keys(decks).length === 0) setDefaultDecks();
        if (!decks[currentDeckKey]) currentDeckKey = Object.keys(decks)[0];
        if (!decks[currentQuizDeckKey]) currentQuizDeckKey = currentDeckKey;
    }
    function setDefaultDecks() {
        decks = {
            vi: { name: 'Tiếng Việt', cards: [{ question: "xin chào", answer: "hello" },{ question: "cảm ơn", answer: "thank you" }] },
            en: { name: 'English', cards: [{ question: "hello", answer: "xin chào" },{ question: "thank you", answer: "cảm ơn" }] }
        };
    }
    function saveDecks() { localStorage.setItem('flashcard_decks_v5', JSON.stringify(decks)); }
    function getCurrentCards() { return decks[currentDeckKey]?.cards || []; }

    function renderDeckTabs() {
        deckTabsContainer.innerHTML = '';
        Object.keys(decks).forEach(key => {
            const deck = decks[key];
            const tab = document.createElement('button');
            tab.className = `deck-tab ${key === currentDeckKey ? 'active' : ''}`;
            tab.innerHTML = `${deck.name} (${key}) <i class="fas fa-times delete-deck" data-deck="${key}"></i>`;
            tab.addEventListener('click', (e) => {
                if (e.target.classList.contains('delete-deck')) {
                    e.stopPropagation();
                    if (Object.keys(decks).length <= 1) { showToast('⚠️ Không thể xóa bộ duy nhất.'); return; }
                    delete decks[key];
                    saveDecks();
                    if (currentDeckKey === key) currentDeckKey = Object.keys(decks)[0];
                    if (currentQuizDeckKey === key) currentQuizDeckKey = currentDeckKey;
                    renderDeckTabs();
                    updateQuizDeckSelector();
                    switchDeck(currentDeckKey);
                } else {
                    switchDeck(key);
                }
            });
            deckTabsContainer.appendChild(tab);
        });
    }

    function updateQuizDeckSelector() {
        quizDeckSelector.innerHTML = '';
        Object.keys(decks).forEach(key => {
            const opt = document.createElement('option');
            opt.value = key;
            opt.textContent = `${decks[key].name} (${key})`;
            if (key === currentQuizDeckKey) opt.selected = true;
            quizDeckSelector.appendChild(opt);
        });
    }

    function switchDeck(key) {
        currentDeckKey = key;
        currentIndex = 0; isFlipped = false;
        renderFlashcard(); renderWordList(); renderDeckTabs();
        setInputLanguage(key);
        localStorage.setItem('lastDeck', key);
    }

    function setInputLanguage(lang) {
        [newWordInput, newDefInput].forEach(inp => inp.setAttribute('lang', lang));
    }

    function renderFlashcard() {
        const cards = getCurrentCards();
        if (!cards.length) {
            cardScene.innerHTML = `<div class="empty-msg"><i class="far fa-folder-open"></i><br>${i18n[currentLang].empty}</div>`;
            counterDisplay.textContent = '0/0';
            setFlashEnabled(false);
            return;
        }
        if (currentIndex < 0) currentIndex = 0;
        if (currentIndex >= cards.length) currentIndex = cards.length - 1;
        const card = cards[currentIndex];
        cardScene.innerHTML = `<div class="card ${isFlipped?'flipped':''}" id="flashcard"><div class="card-inner"><div class="card-front"><div class="card-label">${i18n[currentLang].word}</div><div class="card-content">${escapeHtml(card.question)}</div></div><div class="card-back"><div class="card-label">${i18n[currentLang].meaning}</div><div class="card-content">${escapeHtml(card.answer)}</div></div></div></div>`;
        document.getElementById('flashcard')?.addEventListener('click', ()=> { if(!isSwiping) toggleFlip(); });
        counterDisplay.textContent = `${currentIndex+1}/${cards.length}`;
        setFlashEnabled(true);
        prevBtn.disabled = currentIndex === 0;
        nextBtn.disabled = currentIndex === cards.length - 1;
    }
    function setFlashEnabled(e) { [prevBtn,nextBtn,flipBtn,randomFlashBtn,deleteCardFlashBtn].forEach(b=>b.disabled=!e); }
    function toggleFlip() { if(!getCurrentCards().length) return; const el = document.getElementById('flashcard'); if(el) { isFlipped = !isFlipped; el.classList.toggle('flipped', isFlipped); } }

    function renderWordList() {
        const cards = getCurrentCards();
        if (!cards.length) {
            wordListContainer.innerHTML = `<li class="empty-msg">${i18n[currentLang].empty}</li>`;
            wordCountSpan.textContent = `0 ${i18n[currentLang].word}`;
            return;
        }
        wordCountSpan.textContent = `${cards.length} ${i18n[currentLang].word}`;
        let html = '';
        cards.forEach((c, i) => {
            html += `<li class="word-item"><div class="word-info"><div class="word-term">${escapeHtml(c.question)}</div><div class="word-def">${escapeHtml(c.answer)}</div></div><div class="item-actions"><button class="icon-btn edit-word" data-index="${i}"><i class="fas fa-pen"></i></button><button class="icon-btn delete-word" data-index="${i}"><i class="fas fa-trash"></i></button></div></li>`;
        });
        wordListContainer.innerHTML = html;
        wordListContainer.querySelectorAll('.delete-word').forEach(b => b.addEventListener('click', e => {
            const idx = b.dataset.index;
            if (idx !== undefined) {
                decks[currentDeckKey].cards.splice(idx, 1);
                saveDecks();
                renderWordList(); renderFlashcard();
            }
        }));
        wordListContainer.querySelectorAll('.edit-word').forEach(b => b.addEventListener('click', e => {
            const idx = b.dataset.index;
            if (idx !== undefined) {
                const c = decks[currentDeckKey].cards[idx];
                newWordInput.value = c.question; newDefInput.value = c.answer;
                editingIndex = idx;
                addWordBtn.innerHTML = `<i class="fas fa-pen"></i> ${i18n[currentLang].update}`;
                cancelEditBtn.style.display = 'flex';
            }
        }));
    }

    function addOrUpdateWord() {
        const q = newWordInput.value.trim(), a = newDefInput.value.trim();
        if (!q || !a) return;
        const cards = decks[currentDeckKey].cards;
        if (editingIndex > -1) {
            cards[editingIndex] = { question: q, answer: a };
            editingIndex = -1;
            addWordBtn.innerHTML = `<i class="fas fa-plus"></i> ${i18n[currentLang].add}`;
            cancelEditBtn.style.display = 'none';
        } else {
            cards.push({ question: q, answer: a });
        }
        saveDecks();
        newWordInput.value = ''; newDefInput.value = '';
        renderWordList(); renderFlashcard();
        updateQuizDeckSelector();
    }
    function cancelEdit() {
        editingIndex = -1; newWordInput.value = ''; newDefInput.value = '';
        addWordBtn.innerHTML = `<i class="fas fa-plus"></i> ${i18n[currentLang].add}`;
        cancelEditBtn.style.display = 'none';
    }

    // Xuất DOCX với bảng thiết kế đẹp: tiêu đề xanh, dòng xen kẽ, font chữ rõ
    async function exportToDocx() {
        const cards = getCurrentCards();
        if (!cards.length) { showToast('⚠️ Chưa có từ nào.'); return; }
        const Zip = new JSZip();
        let xmlRows = '';
        cards.forEach((c, idx) => {
            const bgColor = (idx % 2 === 0) ? 'FFFFFF' : 'F2F7FF'; // dòng chẵn trắng, dòng lẻ xanh nhạt
            xmlRows += `<w:tr>
                <w:tc>
                    <w:tcPr><w:shd w:val="clear" w:color="auto" w:fill="${bgColor}"/></w:tcPr>
                    <w:p><w:pPr><w:jc w:val="center"/></w:pPr><w:r><w:rPr><w:sz w:val="28"/></w:rPr><w:t>${escapeHtml(c.question)}</w:t></w:r></w:p>
                </w:tc>
                <w:tc>

                </w:tc>
            </w:tr>`;
        });
        const documentXml = `<?xml version="1.0" encoding="UTF-8" standalone="yes"?>
<w:document xmlns:w="http://schemas.openxmlformats.org/wordprocessingml/2006/main"
    xmlns:r="http://schemas.openxmlformats.org/officeDocument/2006/relationships">

        Zip.file("word/document.xml", documentXml);
        Zip.file("_rels/.rels", `<?xml version="1.0"?><Relationships xmlns="http://schemas.openxmlformats.org/package/2006/relationships"><Relationship Id="rId1" Type="http://schemas.openxmlformats.org/officeDocument/2006/relationships/officeDocument" Target="word/document.xml"/></Relationships>`);
        Zip.file("[Content_Types].xml", `<?xml version="1.0"?><Types xmlns="http://schemas.openxmlformats.org/package/2006/content-types"><Default Extension="rels" ContentType="application/vnd.openxmlformats-package.relationships+xml"/><Default Extension="xml" ContentType="application/xml"/><Override PartName="/word/document.xml" ContentType="application/vnd.openxmlformats-officedocument.wordprocessingml.document.main+xml"/></Types>`);
        const blob = await Zip.generateAsync({type:"blob", mimeType:"application/vnd.openxmlformats-officedocument.wordprocessingml.document"});
        const a = document.createElement('a'); a.href = URL.createObjectURL(blob); a.download = `flashcard_${currentDeckKey}.docx`; a.click();
        showToast('📄 File .docx đã sẵn sàng!');

    // Quiz
    function getQuizCards() { return decks[currentQuizDeckKey]?.cards || []; }
    function pickQuizCard() { const cards = getQuizCards(); return cards.length ? cards[Math.floor(Math.random()*cards.length)] : null; }
    function loadQuiz() {
        currentQuizCard = pickQuizCard();
        if (!currentQuizCard) { quizQuestion.textContent = '—'; return; }
        quizQuestion.textContent = quizMode==='termToDef'? currentQuizCard.question : currentQuizCard.answer;
        quizAnswerInput.value = '';
        quizFeedback.textContent = '';
        quizFeedback.className = 'quiz-feedback';
    }
    function checkQuiz() {
        if(!currentQuizCard) return;
        const ans = quizAnswerInput.value.trim().toLowerCase();
        const correct = (quizMode==='termToDef'? currentQuizCard.answer : currentQuizCard.question).toLowerCase();
        const isCorrect = ans === correct;
        quizFeedback.textContent = isCorrect ? '✅ Chính xác!' : `❌ Đáp án: ${escapeHtml(quizMode==='termToDef'? currentQuizCard.answer : currentQuizCard.question)}`;
        quizFeedback.classList.add(isCorrect ? 'correct' : 'incorrect');
    }

    function goPrev() { if(getCurrentCards().length && currentIndex>0) { currentIndex--; isFlipped=false; renderFlashcard(); } }
    function goNext() { if(getCurrentCards().length && currentIndex<getCurrentCards().length-1) { currentIndex++; isFlipped=false; renderFlashcard(); } }
    function goRandom() { const cards=getCurrentCards(); if(cards.length>1) { let n; do{n=Math.floor(Math.random()*cards.length);}while(n===currentIndex); currentIndex=n; isFlipped=false; renderFlashcard(); } }
    function deleteCurrentFlash() { const cards=getCurrentCards(); if(!cards.length) return; cards.splice(currentIndex,1); saveDecks(); if(!cards.length) { currentIndex=-1; renderFlashcard(); renderWordList(); return; } if(currentIndex>=cards.length) currentIndex=cards.length-1; isFlipped=false; renderFlashcard(); renderWordList(); updateQuizDeckSelector(); }

    function handleTouchStart(e) { if(!getCurrentCards().length) return; touchStartX=e.touches[0].clientX; isSwiping=true; swipeContainer.style.transition='none'; }
    function handleTouchMove(e) { if(!isSwiping) return; touchCurrentX=e.touches[0].clientX; let dx=touchCurrentX-touchStartX; dx=Math.max(-120, Math.min(120,dx)); swipeContainer.style.transform=`translateX(${dx}px)`; }
    function handleTouchEnd() { if(!isSwiping) return; isSwiping=false; const dx = touchCurrentX - touchStartX; swipeContainer.style.transition = 'transform 0.25s'; if (Math.abs(dx) > SWIPE_THRESHOLD) { if (dx > 0 && currentIndex > 0) { swipeContainer.style.transform = 'translateX(130%) scale(0.95)'; setTimeout(()=>{ goPrev(); swipeContainer.style.transition=''; swipeContainer.style.transform=''; },200); } else if (dx < 0 && currentIndex < getCurrentCards().length-1) { swipeContainer.style.transform = 'translateX(-130%) scale(0.95)'; setTimeout(()=>{ goNext(); swipeContainer.style.transition=''; swipeContainer.style.transform=''; },200); } else { swipeContainer.style.transform='translateX(0)'; setTimeout(()=>swipeContainer.style.transition='',200); } } else { swipeContainer.style.transform='translateX(0)'; setTimeout(()=>swipeContainer.style.transition='',200); } }

    function showToast(msg) { const toast = document.createElement('div'); toast.className='toast-msg'; toast.textContent=msg; document.body.appendChild(toast); setTimeout(()=>toast.remove(), 3000); }

    function updateUITexts() {
        document.querySelectorAll('[data-i18n]').forEach(el => { const key = el.dataset.i18n; if(i18n[currentLang]?.[key]) el.textContent = i18n[currentLang][key]; });
        document.getElementById('appTitle').textContent = 'Flashcard';
        document.querySelectorAll('.lang-btn').forEach(b => b.classList.toggle('active', b.dataset.lang === currentLang));
    }

    function init() {
        initDecks();
        const last = localStorage.getItem('lastDeck'); if (last && decks[last]) currentDeckKey = last;
        if (!decks[currentQuizDeckKey]) currentQuizDeckKey = currentDeckKey;
        renderDeckTabs();
        updateQuizDeckSelector();
        setInputLanguage(currentDeckKey);
        renderFlashcard(); renderWordList(); loadQuiz();

        const sel = document.getElementById('langSelector');
        languages.forEach(l => { const b = document.createElement('button'); b.className = `lang-btn ${l===currentLang?'active':''}`; b.dataset.lang = l; b.textContent = langNames[l].substring(0,2).toUpperCase(); b.addEventListener('click', ()=>{ currentLang = l; updateUITexts(); renderFlashcard(); renderWordList(); loadQuiz(); }); sel.appendChild(b); });
        updateUITexts();

        showAddDeckFormBtn.addEventListener('click', ()=> { addDeckForm.style.display = 'flex'; newDeckName.focus(); });
        cancelAddDeckBtn.addEventListener('click', ()=> { addDeckForm.style.display = 'none'; newDeckName.value = ''; });
        confirmAddDeckBtn.addEventListener('click', ()=>{
            const name = newDeckName.value.trim();
            const lang = newDeckLang.value;
            if (!name) { showToast('⚠️ Vui lòng nhập tên bộ'); return; }
            if (decks[lang]) { showToast('⚠️ Bộ với mã ngôn ngữ này đã tồn tại'); return; }
            decks[lang] = { name: name, cards: [] };
            saveDecks();
            renderDeckTabs();
            updateQuizDeckSelector();
            switchDeck(lang);
            addDeckForm.style.display = 'none';
            newDeckName.value = '';
            showToast(`✅ Đã tạo bộ "${name}"`);
        });

        quizDeckSelector.addEventListener('change', (e) => {
            currentQuizDeckKey = e.target.value;
            loadQuiz();
        });

        document.querySelectorAll('.tab-btn').forEach(b => b.addEventListener('click', ()=>{
            const tab = b.dataset.tab;
            Object.values(panels).forEach(p => p.classList.remove('active'));
            panels[tab].classList.add('active');
            document.querySelectorAll('.tab-btn').forEach(t => t.classList.toggle('active', t.dataset.tab===tab));
            if (tab === 'flashcard') renderFlashcard();
            if (tab === 'wordlist') renderWordList();
            if (tab === 'quiz') { updateQuizDeckSelector(); loadQuiz(); }
        }));

        prevBtn.addEventListener('click', goPrev); nextBtn.addEventListener('click', goNext); flipBtn.addEventListener('click', toggleFlip);
        randomFlashBtn.addEventListener('click', goRandom); deleteCardFlashBtn.addEventListener('click', deleteCurrentFlash);
        addWordBtn.addEventListener('click', addOrUpdateWord); cancelEditBtn.addEventListener('click', cancelEdit);
        exportWordBtn.addEventListener('click', exportToDocx);

        const stage = document.getElementById('cardStage');
        stage.addEventListener('touchstart', handleTouchStart, {passive:true});
        stage.addEventListener('touchmove', handleTouchMove, {passive:true});
        stage.addEventListener('touchend', handleTouchEnd);

        window.addEventListener('keydown', e => { if(panels.flashcard.classList.contains('active')){ if(e.key==='ArrowLeft'){e.preventDefault(); goPrev();} else if(e.key==='ArrowRight'){e.preventDefault(); goNext();} else if(e.key===' '){e.preventDefault(); toggleFlip();} } });

        submitQuizBtn.addEventListener('click', checkQuiz); nextQuizBtn.addEventListener('click', loadQuiz); newQuizBtn.addEventListener('click', loadQuiz);
        modeTermToDef.addEventListener('click', ()=>{ quizMode='termToDef'; modeTermToDef.classList.add('active'); modeDefToTerm.classList.remove('active'); loadQuiz(); });
        modeDefToTerm.addEventListener('click', ()=>{ quizMode='defToTerm'; modeDefToTerm.classList.add('active'); modeTermToDef.classList.remove('active'); loadQuiz(); });
    }

    init();
})();
</script>
</body>
</html>
